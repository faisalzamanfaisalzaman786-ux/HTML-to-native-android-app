<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>CodeForge Pro – Stable Build Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #050b17; color: #eef5ff; height: 100dvh; display: flex; flex-direction: column; overflow: hidden; }
        .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: rgba(2,4,12,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid #2a3a60; flex-shrink: 0; }
        .icon-btn { background: #1e2a3a; border: none; width: 40px; height: 40px; border-radius: 30px; color: #ccd6f6; cursor: pointer; }
        .icon-btn.special { border: 1px solid #0fc; color: #0fc; }
        .title { font-weight: 800; background: linear-gradient(125deg,#0fc,#a855f7); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .main-work-area { flex: 1; display: flex; flex-direction: column; padding: 12px; gap: 12px; overflow: hidden; }
        .editor-panel { display: flex; flex-direction: column; gap: 10px; flex: 1; min-height: 200px; }
        .file-info-bar { background: #010612cc; border-radius: 28px; padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .current-file-path { font-family: monospace; font-size: 0.7rem; background: #0a1022; padding: 4px 12px; border-radius: 40px; color: #0fc; }
        .save-btn { background: linear-gradient(95deg,#0fc,#1c9eff); border: none; padding: 6px 18px; border-radius: 40px; font-weight: 700; cursor: pointer; color: #02040c; }
        textarea#codeEditor { width: 100%; flex: 1; background: #030617; border: 1px solid #2f4170; border-radius: 20px; padding: 14px; font-family: monospace; font-size: 0.8rem; color: #e2eaff; resize: vertical; outline: none; }
        .build-footer { display: flex; gap: 12px; margin-top: 4px; }
        .btn-build, .btn-download { flex: 1; padding: 10px; border-radius: 40px; font-weight: 800; cursor: pointer; border: none; }
        .btn-build { background: linear-gradient(95deg,#0fc,#1c9eff); color: #02040c; }
        .btn-download { background: #a855f7; color: white; }
        .console-container { background: #010612ee; backdrop-filter: blur(12px); border-top: 1px solid #2c3d62; border-radius: 16px 16px 0 0; margin-top: 6px; flex-shrink: 0; max-height: 32vh; display: flex; flex-direction: column; }
        .console-container.collapsed { max-height: 44px; overflow: hidden; }
        .console-header { display: flex; justify-content: space-between; padding: 8px 14px; background: #01101f; cursor: pointer; border-radius: 16px 16px 0 0; }
        .console-content { overflow-y: auto; padding: 8px 12px; font-family: monospace; font-size: 0.7rem; white-space: pre-wrap; }
        .console-content p { margin: 3px 0; border-left: 2px solid #0fc; padding-left: 8px; }
        .status-bar { background: #0a1222; border-radius: 20px; padding: 4px 12px; font-size: 0.7rem; display: inline-block; margin-bottom: 6px; }
        .drawer { position: fixed; top: 0; width: 85%; max-width: 340px; height: 100%; background: #010b1ae0; backdrop-filter: blur(20px); z-index: 1000; transition: transform 0.25s ease; display: flex; flex-direction: column; border-right: 1px solid #2c3d62; }
        .drawer.right { right: 0; transform: translateX(100%); }
        .drawer.left { left: 0; transform: translateX(-100%); }
        .drawer.open { transform: translateX(0); }
        .drawer-header { display: flex; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #2c3d62; }
        .drawer-content { flex: 1; overflow-y: auto; padding: 16px; }
        .file-group { margin-bottom: 18px; }
        .group-title { font-size: 0.65rem; color: #9bb3e0; border-left: 2px solid #0fc; padding-left: 8px; margin-bottom: 8px; }
        .tabs-grid { display: flex; flex-wrap: wrap; gap: 8px; }
        .file-tab { background: #0f172ab3; border: 1px solid #2f4170; border-radius: 40px; padding: 5px 12px; font-size: 0.7rem; font-family: monospace; cursor: pointer; display: inline-flex; align-items: center; gap: 5px; }
        .file-tab.active-tab { background: #0fc30; border-color: #0fc; color: #0fc; }
        .delete-icon { margin-left: 6px; color: #ff8888; font-size: 0.7rem; opacity: 0.7; transition: 0.2s; }
        .delete-icon:hover { opacity: 1; color: #ff5555; }
        .settings-group { margin-bottom: 20px; }
        .settings-group label { font-size: 0.7rem; color: #0fc; display: block; margin-bottom: 5px; }
        .settings-group input { width: 100%; background: #030617; border: 1px solid #2f4170; border-radius: 20px; padding: 8px 12px; color: white; }
        .icon-upload-area { background: #0d1426; border: 1px dashed #0fc; border-radius: 20px; padding: 12px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .icon-upload-area:hover { background: #121a30; border-color: #1c9eff; }
        .icon-preview-img { width: 64px; height: 64px; border-radius: 16px; border: 2px solid #0fc; margin-top: 8px; object-fit: cover; }
        .icon-info { font-size: 0.65rem; color: #9bb3e0; margin-top: 6px; }
        .action-btn { background: #2a3a60; border: none; border-radius: 40px; padding: 8px; color: white; font-weight: 600; cursor: pointer; width: 100%; margin-top: 12px; }
        .action-btn.danger { background: #aa2e2e; }
        .toast-msg { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(100px); background: #0f172a; border: 1px solid #0fc; padding: 8px 18px; border-radius: 40px; font-size: 0.75rem; transition: 0.2s; opacity: 0; z-index: 1200; }
        .toast-msg.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .new-file-row { display: flex; gap: 6px; margin: 10px 0; }
        .new-file-row input { flex: 1; background: #030617; border: 1px solid #2f4170; border-radius: 40px; padding: 6px 10px; font-size: 0.7rem; color: white; }
        .new-file-row button { background: #0fc20; border: 1px solid #0fc; border-radius: 40px; padding: 6px 12px; color: #0fc; cursor: pointer; }
    </style>
</head>
<body>
<div class="top-bar">
    <div class="left-actions">
        <button class="icon-btn special" id="menuLeftBtn"><i class="fas fa-folder-open"></i></button>
        <button class="icon-btn" id="saveAllBtn"><i class="fas fa-save"></i></button>
        <button class="icon-btn" id="copyAllBtn"><i class="fas fa-copy"></i></button>
    </div>
    <div class="title">⚡ CodeForge Pro</div>
    <div class="right-actions">
        <button class="icon-btn special" id="settingsRightBtn"><i class="fas fa-cog"></i></button>
    </div>
</div>
<div class="main-work-area">
    <div class="editor-panel">
        <div class="file-info-bar">
            <span class="current-file-path" id="currentFilePath">📄 No file</span>
            <div style="display: flex; gap: 8px;">
                <button class="save-btn" id="saveCurrentBtn">Save File</button>
                <button class="save-btn" id="resetEditorBtn" style="background:#4a5a7a;">Reset Editor</button>
            </div>
        </div>
        <textarea id="codeEditor" placeholder="Select a file from left drawer"></textarea>
    </div>
    <div class="build-footer">
        <button class="btn-build" id="uploadBuildBtn"><i class="fas fa-rocket"></i> Upload & Build</button>
        <button class="btn-download" id="downloadApkBtn"><i class="fas fa-download"></i> Download APK</button>
    </div>
</div>
<div id="consoleDrawer" class="console-container">
    <div class="console-header" id="consoleHeader">
        <h3><i class="fas fa-terminal"></i> Logs <span id="buildStatusBadge" class="status-bar">⏳ idle</span></h3>
        <div>
            <button id="clearConsoleBtn"><i class="fas fa-eraser"></i></button>
            <button id="toggleConsoleBtn"><i class="fas fa-chevron-down"></i></button>
        </div>
    </div>
    <div class="console-content" id="consoleContent"><p>✅ Ready. Click any file tab to edit.</p></div>
</div>

<div id="leftDrawer" class="drawer left">
    <div class="drawer-header"><h2><i class="fas fa-code-branch"></i> Files</h2><button class="close-drawer" id="closeLeftDrawer"><i class="fas fa-times"></i></button></div>
    <div class="drawer-content" id="fileTabsList"></div>
    <div style="padding:12px">
        <div class="new-file-row"><input id="newFilePath" placeholder="path/to/NewFile.java"><button id="createNewFileBtn">+ New</button></div>
        <button id="newEmptyProjectBtn" class="action-btn danger">Empty Project</button>
        <button id="resetDemoProjectBtn" class="action-btn">Reset Demo</button>
    </div>
</div>
<div id="rightDrawer" class="drawer right">
    <div class="drawer-header"><h2>Settings</h2><button class="close-drawer" id="closeRightDrawer"><i class="fas fa-times"></i></button></div>
    <div class="drawer-content">
        <div class="settings-group"><label>GitHub Repo (owner/repo)</label><input id="ghRepo" placeholder="yourname/repo"></div>
        <div class="settings-group"><label>GitHub Token</label><input id="ghToken" type="password" placeholder="ghp_..."></div>
        <div class="settings-group"><label>Package Name</label><input id="pkgName" placeholder="com.example.app"></div>
        <div class="settings-group"><label>App Name</label><input id="appName" placeholder="My App"></div>
        <div class="settings-group"><label>App Icon (Any Image → PNG)</label>
            <div class="icon-upload-area" id="iconUploadArea">
                <i class="fas fa-cloud-upload-alt"></i> Click to select image (JPG, PNG, WEBP, GIF)
                <input type="file" id="iconInput" accept="image/*" style="display:none">
                <div id="iconPreviewContainer"></div>
                <div class="icon-info" id="iconInfo"></div>
            </div>
        </div>
        <button id="saveSettingsBtn" style="background:#0fc; color:#010612; font-weight:bold;">Save Settings</button>
    </div>
</div>
<div id="toastMsg" class="toast-msg"></div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    // ---------- STATE ----------
    var allFiles = new Map();
    var currentFile = null;
    var appIconBase64 = "";
    var globalSettings = { ghRepo: "", ghToken: "", pkgName: "com.systempro.app", appName: "CodeForge Pro" };
    var isBuilding = false;
    var editorTimer = null;
    var autoSaveInterval = null;
    var pollInterval = null;
    var currentRunId = null;
    var buildCompleted = false;

    // ---------- HELPERS ----------
    function consoleLog(msg, isErr) {
        if (isErr === undefined) isErr = false;
        var c = document.getElementById("consoleContent");
        if (!c) return;
        var p = document.createElement("p");
        var time = new Date().toLocaleTimeString();
        p.innerHTML = "<span style=\"color:#0fc\">[" + time + "]</span> " + (isErr ? "❌" : "✓") + " " + escapeHtml(msg);
        if (isErr) p.style.borderLeftColor = "#f55";
        c.appendChild(p);
        try { p.scrollIntoView(); } catch(e) {}
        while (c.children.length > 300) c.removeChild(c.firstChild);
    }

    function setStatus(status) {
        var badge = document.getElementById("buildStatusBadge");
        if (badge) badge.innerText = status;
    }

    function escapeHtml(s) {
        return s.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function toast(msg) {
        var t = document.getElementById("toastMsg");
        t.innerText = msg;
        t.classList.add("show");
        setTimeout(function() { t.classList.remove("show"); }, 1300);
    }

    function utf8ToBase64(str) {
        try {
            return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(m, p1) {
                return String.fromCharCode('0x' + p1);
            }));
        } catch(e) {
            return btoa(str);
        }
    }

    function syncEditorToMap() {
        if (currentFile && allFiles.has(currentFile)) {
            allFiles.set(currentFile, document.getElementById("codeEditor").value);
        }
    }

    function saveAllToLocal() {
        syncEditorToMap();
        var obj = {};
        for (var kv of allFiles.entries()) { obj[kv[0]] = kv[1]; }
        localStorage.setItem("codeforge_files", JSON.stringify(obj));
        localStorage.setItem("codeforge_settings", JSON.stringify(globalSettings));
        if (appIconBase64) localStorage.setItem("codeforge_icon", appIconBase64);
        else localStorage.removeItem("codeforge_icon");
        consoleLog("All files saved", false);
        toast("Saved");
        renderFileTree();
    }

    if (autoSaveInterval) clearInterval(autoSaveInterval);
    autoSaveInterval = setInterval(function() {
        if (allFiles.size > 0) saveAllToLocal();
    }, 20000);

    // ---------- PROJECT TEMPLATES ----------
    function loadEmptyProject() {
        allFiles.clear();
        var currentPkg = globalSettings.pkgName || "com.systempro.app";
        var currentAppName = globalSettings.appName || "CodeForge Pro";
        var pkgPath = currentPkg.replace(/\./g, '/');
        allFiles.set("app/src/main/java/" + pkgPath + "/MainActivity.java",
            "package " + currentPkg + ";\n\nimport android.app.Activity;\nimport android.os.Bundle;\nimport android.widget.TextView;\n\npublic class MainActivity extends Activity {\n    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.activity_main);\n        TextView tv = findViewById(R.id.textView);\n        tv.setText(\"Hello from CodeForge Pro!\");\n    }\n}");
        allFiles.set("app/src/main/res/layout/activity_main.xml",
            "<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\n    android:layout_width=\"match_parent\"\n    android:layout_height=\"match_parent\"\n    android:gravity=\"center\"\n    android:orientation=\"vertical\"\n    android:padding=\"24dp\">\n    <TextView\n        android:id=\"@+id/textView\"\n        android:layout_width=\"wrap_content\"\n        android:layout_height=\"wrap_content\"\n        android:text=\"Hello CodeForge\"\n        android:textSize=\"28sp\"\n        android:textColor=\"#00FFCC\" />\n</LinearLayout>");
        allFiles.set("app/src/main/res/values/strings.xml",
            "<resources>\n    <string name=\"app_name\">" + currentAppName + "</string>\n</resources>");
        allFiles.set("app/src/main/res/values/colors.xml",
            "<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<resources>\n    <color name=\"colorPrimary\">#6200EE</color>\n    <color name=\"colorPrimaryDark\">#3700B3</color>\n    <color name=\"colorAccent\">#03DAC5</color>\n</resources>");
        allFiles.set("app/src/main/AndroidManifest.xml",
            "<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"\n    package=\"" + currentPkg + "\">\n    <application\n        android:allowBackup=\"true\"\n        android:icon=\"@mipmap/ic_launcher\"\n        android:label=\"@string/app_name\">\n        <activity android:name=\".MainActivity\" android:exported=\"true\">\n            <intent-filter>\n                <action android:name=\"android.intent.action.MAIN\" />\n                <category android:name=\"android.intent.category.LAUNCHER\" />\n            </intent-filter>\n        </activity>\n    </application>\n</manifest>");
    }

    function loadMinimalDemo() {
        allFiles.clear();
        var currentPkg = globalSettings.pkgName || "com.systempro.app";
        var currentAppName = globalSettings.appName || "CodeForge Pro";
        var pkgPath = currentPkg.replace(/\./g, '/');
        allFiles.set("app/src/main/java/" + pkgPath + "/MainActivity.java",
            "package " + currentPkg + ";\n\nimport android.app.Activity;\nimport android.os.Bundle;\nimport android.widget.TextView;\n\npublic class MainActivity extends Activity {\n    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.activity_main);\n        TextView tv = findViewById(R.id.textView);\n        tv.setText(\"CodeForge Pro - Minimal Demo\");\n    }\n}");
        allFiles.set("app/src/main/res/layout/activity_main.xml",
            "<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout xmlns:android=\"http://schemas.android.com/apk/res/android\"\n    android:layout_width=\"match_parent\"\n    android:layout_height=\"match_parent\"\n    android:gravity=\"center\"\n    android:orientation=\"vertical\"\n    android:padding=\"24dp\">\n    <TextView\n        android:id=\"@+id/textView\"\n        android:layout_width=\"wrap_content\"\n        android:layout_height=\"wrap_content\"\n        android:text=\"Hello from Minimal Demo\"\n        android:textSize=\"28sp\"\n        android:textColor=\"#00FFCC\" />\n</LinearLayout>");
        allFiles.set("app/src/main/res/values/strings.xml", "<resources>\n    <string name=\"app_name\">" + currentAppName + "</string>\n</resources>");
        allFiles.set("app/src/main/res/values/colors.xml",
            "<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<resources>\n    <color name=\"colorPrimary\">#6200EE</color>\n    <color name=\"colorPrimaryDark\">#3700B3</color>\n    <color name=\"colorAccent\">#03DAC5</color>\n</resources>");
        allFiles.set("app/src/main/AndroidManifest.xml",
            "<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest xmlns:android=\"http://schemas.android.com/apk/res/android\"\n    package=\"" + currentPkg + "\">\n    <application\n        android:allowBackup=\"true\"\n        android:icon=\"@mipmap/ic_launcher\"\n        android:label=\"@string/app_name\">\n        <activity android:name=\".MainActivity\" android:exported=\"true\">\n            <intent-filter>\n                <action android:name=\"android.intent.action.MAIN\" />\n                <category android:name=\"android.intent.category.LAUNCHER\" />\n            </intent-filter>\n        </activity>\n    </application>\n</manifest>");
    }

    function setProject(loader, name) {
        loader();
        var keys = Array.from(allFiles.keys());
        currentFile = keys.length > 0 ? keys[0] : null;
        saveAllToLocal();
        renderFileTree();
        resetEditor();
        toast(name);
        consoleLog(name + " loaded", false);
    }

    function loadAll() {
        try {
            var stored = localStorage.getItem("codeforge_files");
            if (stored) {
                var obj = JSON.parse(stored);
                allFiles.clear();
                for (var k in obj) {
                    if (obj.hasOwnProperty(k)) allFiles.set(k, obj[k]);
                }
            }
        } catch(e) {}
        if (allFiles.size === 0) loadMinimalDemo();
        try {
            var sets = localStorage.getItem("codeforge_settings");
            if (sets) {
                globalSettings = JSON.parse(sets);
                document.getElementById("ghRepo").value = globalSettings.ghRepo || "";
                document.getElementById("ghToken").value = globalSettings.ghToken || "";
                document.getElementById("pkgName").value = globalSettings.pkgName || "com.systempro.app";
                document.getElementById("appName").value = globalSettings.appName || "CodeForge Pro";
            }
        } catch(e) {}
        var icon = localStorage.getItem("codeforge_icon");
        if (icon) { appIconBase64 = icon; showIconPreview(); }
        var keys = Array.from(allFiles.keys());
        if (!currentFile && allFiles.size) currentFile = keys[0];
        renderFileTree();
        resetEditor();
    }

    function deleteFile(path) {
        if (!allFiles.has(path)) { toast("File not found"); return; }
        if (confirm("Are you sure you want to delete \"" + path + "\"?")) {
            allFiles.delete(path);
            if (currentFile === path) {
                currentFile = null;
                document.getElementById("codeEditor").value = "";
                document.getElementById("currentFilePath").innerHTML = "📄 No file selected";
            }
            saveAllToLocal();
            renderFileTree();
            toast("Deleted " + path.split('/').pop());
            consoleLog("File deleted: " + path, false);
        }
    }

    function renderFileTree() {
        var container = document.getElementById("fileTabsList");
        if (!container) return;
        container.innerHTML = "";
        var groups = {"📱 Java":[], "🎨 Layouts":[], "📄 Manifest":[], "⚙️ Gradle":[], "📁 Other":[]};
        for (var p of allFiles.keys()) {
            if (p.endsWith(".java")) groups["📱 Java"].push(p);
            else if (p.includes("/layout/")) groups["🎨 Layouts"].push(p);
            else if (p.includes("AndroidManifest.xml")) groups["📄 Manifest"].push(p);
            else if (p.includes(".gradle") || p.includes("settings.gradle") || p.includes("gradle.properties")) groups["⚙️ Gradle"].push(p);
            else groups["📁 Other"].push(p);
        }
        for (var cat in groups) {
            var paths = groups[cat];
            if (paths.length === 0) continue;
            var catDiv = document.createElement("div");
            catDiv.className = "file-group";
            catDiv.innerHTML = "<div class=\"group-title\">" + cat + "</div><div class=\"tabs-grid\"></div>";
            container.appendChild(catDiv);
            var grid = catDiv.querySelector(".tabs-grid");
            paths.sort().forEach(function(p) {
                var tab = document.createElement("div");
                tab.className = "file-tab" + (currentFile === p ? " active-tab" : "");
                var fileName = escapeHtml(p.split('/').pop());
                tab.innerHTML = "<i class=\"fas fa-file-code\"></i> <span>" + fileName + "</span> <i class=\"fas fa-trash-alt delete-icon\" data-path=\"" + p + "\" title=\"Delete file\"></i>";
                tab.onclick = function(e) {
                    if (e.target.classList && e.target.classList.contains('delete-icon')) {
                        e.stopPropagation();
                        deleteFile(p);
                    } else {
                        selectFile(p);
                    }
                };
                grid.appendChild(tab);
            });
        }
    }

    function selectFile(path) {
        if (!allFiles.has(path)) return;
        syncEditorToMap();
        currentFile = path;
        document.getElementById("codeEditor").value = allFiles.get(path);
        document.getElementById("currentFilePath").innerHTML = "📄 " + path;
        closeLeftDrawer();
        renderFileTree();
        consoleLog("Opened " + path, false);
    }

    function saveCurrent() {
        if (!currentFile) { toast("No file"); return; }
        syncEditorToMap();
        saveAllToLocal();
        toast("Saved " + currentFile.split('/').pop());
    }

    function resetEditor() {
        if (currentFile && allFiles.has(currentFile)) {
            document.getElementById("codeEditor").value = allFiles.get(currentFile);
        } else {
            document.getElementById("codeEditor").value = "";
        }
    }

    function createNewFile() {
        var newPath = document.getElementById("newFilePath").value.trim();
        if (!newPath) { toast("Enter path"); return; }
        if (allFiles.has(newPath)) { toast("Exists"); return; }
        var ext = newPath.split('.').pop();
        var content = "";
        if (ext === "java") {
            var currentPkg = globalSettings.pkgName || "com.systempro.app";
            var className = newPath.split('/').pop().replace(".java", "");
            content = "package " + currentPkg + ";\n\npublic class " + className + " {\n    // TODO\n}\n";
        } else if (ext === "xml") {
            content = "<?xml version=\"1.0\"?>\n<root/>";
        } else {
            content = "// new file content";
        }
        allFiles.set(newPath, content);
        saveAllToLocal();
        document.getElementById("newFilePath").value = "";
        selectFile(newPath);
        toast("Created");
    }

    // ---------- GITHUB UPLOAD ----------
    async function uploadToGit(owner, repo, path, content, token, isBinary, retries) {
        if (retries === undefined) retries = 3;
        for (var attempt = 0; attempt < retries; attempt++) {
            try {
                var url = "https://api.github.com/repos/" + owner + "/" + repo + "/contents/" + path;
                var encoded = isBinary ? content : utf8ToBase64(content);
                var sha = null;
                try {
                    var resCheck = await fetch(url + "?ref=main", { headers: { Authorization: "token " + token } });
                    if (resCheck.ok) {
                        var d = await resCheck.json();
                        sha = d.sha;
                    }
                } catch(e) {}
                var body = { message: "Update " + path, content: encoded, branch: "main" };
                if (sha) body.sha = sha;
                var r = await fetch(url, {
                    method: "PUT",
                    headers: { Authorization: "token " + token, "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });
                if (!r.ok) throw new Error("HTTP " + r.status);
                return true;
            } catch(e) {
                if (attempt === retries - 1) throw e;
                await new Promise(function(r) { setTimeout(r, 2000); });
            }
        }
    }

    // Poll workflow runs and fetch logs
    async function startPollingWorkflow(owner, repo, token) {
        if (pollInterval) clearInterval(pollInterval);
        setStatus("⏳ triggering...");
        var startTime = Date.now();
        var lastLogCount = 0;
        pollInterval = setInterval(async function() {
            try {
                var runsUrl = `https://api.github.com/repos/${owner}/${repo}/actions/runs?event=repository_dispatch&per_page=1`;
                var runsRes = await fetch(runsUrl, { headers: { Authorization: `token ${token}` } });
                if (!runsRes.ok) throw new Error("Failed to fetch runs");
                var runsData = await runsRes.json();
                if (runsData.workflow_runs && runsData.workflow_runs.length > 0) {
                    var latestRun = runsData.workflow_runs[0];
                    var runId = latestRun.id;
                    var status = latestRun.status;
                    var conclusion = latestRun.conclusion;
                    if (status === "completed") {
                        clearInterval(pollInterval);
                        pollInterval = null;
                        if (conclusion === "success") {
                            setStatus("✅ success");
                            consoleLog("Build completed successfully!", false);
                            buildCompleted = true;
                            toast("Build successful! APK ready to download.");
                        } else {
                            setStatus("❌ failed");
                            consoleLog("Build failed. Check logs.", true);
                            buildCompleted = false;
                        }
                        var logsUrl = latestRun.logs_url;
                        if (logsUrl) {
                            var logsRes = await fetch(logsUrl, { headers: { Authorization: `token ${token}` } });
                            if (logsRes.ok) {
                                var logsText = await logsRes.text();
                                var lines = logsText.split("\n");
                                var tail = lines.slice(-60).join("\n");
                                consoleLog("--- Last logs ---", false);
                                var logLines = tail.split("\n");
                                for (var i = 0; i < logLines.length; i++) {
                                    if (logLines[i].trim()) consoleLog(logLines[i], false);
                                }
                            }
                        }
                        return;
                    } else {
                        setStatus(`⏳ ${status}...`);
                        if (Date.now() - startTime > 300000) {
                            clearInterval(pollInterval);
                            pollInterval = null;
                            setStatus("⌛ timeout");
                            consoleLog("Build timeout. Check GitHub Actions manually.", true);
                        }
                    }
                }
            } catch(e) {
                consoleLog("Polling error: " + e.message, true);
            }
        }, 3000);
    }

    async function startBuild() {
        if (isBuilding) {
            toast("Build already in progress");
            return;
        }
        syncEditorToMap();
        var ghToken = globalSettings.ghToken;
        var ghRepo = globalSettings.ghRepo;
        var pkgName = globalSettings.pkgName;
        var appName = globalSettings.appName;
        if (!ghToken || !ghRepo) {
            consoleLog("Missing GitHub token or repo", true);
            toast("Set GitHub settings");
            return;
        }
        var parts = ghRepo.split("/");
        var owner = parts[0];
        var repo = parts[1];
        if (!owner || !repo) {
            consoleLog("Invalid repo format", true);
            return;
        }
        isBuilding = true;
        var buildBtn = document.getElementById("uploadBuildBtn");
        buildBtn.disabled = true;
        buildBtn.style.opacity = "0.5";
        buildBtn.innerText = "Uploading...";
        consoleLog("Uploading " + allFiles.size + " files...", false);
        var ok = true;
        var fileArray = Array.from(allFiles.entries());
        for (var i = 0; i < fileArray.length; i++) {
            var path = fileArray[i][0];
            var content = fileArray[i][1];
            try {
                await uploadToGit(owner, repo, path, content, ghToken, false, 3);
                consoleLog("⬆️ " + path, false);
            } catch(e) {
                consoleLog("Fail " + path + ": " + e.message, true);
                ok = false;
                break;
            }
        }
        if (appIconBase64 && ok) {
            try {
                await uploadToGit(owner, repo, "build_assets/app_icon.png", appIconBase64, ghToken, true, 3);
                consoleLog("Icon uploaded", false);
            } catch(e) {
                consoleLog("Icon upload failed: " + e.message, true);
            }
        }
        if (!ok) {
            buildBtn.disabled = false;
            buildBtn.style.opacity = "1";
            buildBtn.innerText = "Upload & Build";
            isBuilding = false;
            setStatus("❌ upload failed");
            return;
        }
        buildBtn.innerText = "Triggering Build...";
        consoleLog("Waiting for GitHub sync...", false);
        await new Promise(function(r) { setTimeout(r, 4000); });
        try {
            consoleLog("Sending repository dispatch...", false);
            var dispatch = await fetch("https://api.github.com/repos/" + owner + "/" + repo + "/dispatches", {
                method: "POST",
                headers: { Authorization: "token " + ghToken, "Content-Type": "application/json" },
                body: JSON.stringify({
                    event_type: "trigger_b64_build",
                    client_payload: {
                        package_name: pkgName || "com.systempro.app",
                        app_name: appName || "CodeForge Pro",
                        files: Object.fromEntries(allFiles),
                        icon: appIconBase64 || "",
                        build_time: Date.now()
                    }
                })
            });
            if (dispatch.ok) {
                consoleLog("✅ Build triggered successfully!", false);
                toast("Build started");
                startPollingWorkflow(owner, repo, ghToken);
            } else {
                var txt = await dispatch.text();
                consoleLog("Dispatch error: " + txt, true);
                setStatus("❌ dispatch failed");
            }
        } catch(e) {
            consoleLog("Dispatch failed: " + e.message, true);
            setStatus("❌ dispatch error");
        }
        buildBtn.disabled = false;
        buildBtn.style.opacity = "1";
        buildBtn.innerText = "Upload & Build";
        isBuilding = false;
    }

    async function downloadApk() {
        if (!globalSettings.ghRepo || !globalSettings.ghToken) {
            toast("Set GitHub token and repo first");
            return;
        }
        var parts = globalSettings.ghRepo.split("/");
        var owner = parts[0];
        var repo = parts[1];
        var token = globalSettings.ghToken;
        try {
            var releaseUrl = `https://api.github.com/repos/${owner}/${repo}/releases/tags/latest-release`;
            var res = await fetch(releaseUrl, { headers: { Authorization: `token ${token}` } });
            if (!res.ok) throw new Error("No release found. Build first?");
            var release = await res.json();
            var assets = release.assets;
            var apkAsset = assets.find(a => a.name.endsWith(".apk"));
            if (!apkAsset) throw new Error("APK asset not found in release");
            var downloadUrl = apkAsset.browser_download_url;
            window.open(downloadUrl, "_blank");
            toast("Download started");
        } catch(e) {
            consoleLog("Download error: " + e.message, true);
            toast("No APK available. Build first.");
        }
    }

    // ---------- UPDATED ICON HANDLER: Any Image → PNG Conversion with Size Control ----------
    // Maximum dimension for app icon (max 192px to keep size small)
    var MAX_ICON_SIZE = 192;
    
    function resizeAndConvertToPNG(file, maxDimension, callback) {
        var reader = new FileReader();
        reader.onload = function(ev) {
            var img = new Image();
            img.onload = function() {
                var width = img.width;
                var height = img.height;
                var newWidth, newHeight;
                
                // Calculate new dimensions keeping aspect ratio, max dimension limited to maxDimension
                if (width > height) {
                    newWidth = Math.min(width, maxDimension);
                    newHeight = Math.round((height * newWidth) / width);
                } else {
                    newHeight = Math.min(height, maxDimension);
                    newWidth = Math.round((width * newHeight) / height);
                }
                
                // Further limit if both dimensions exceed max (safety)
                if (newWidth > maxDimension) newWidth = maxDimension;
                if (newHeight > maxDimension) newHeight = maxDimension;
                
                var canvas = document.createElement("canvas");
                canvas.width = newWidth;
                canvas.height = newHeight;
                var ctx = canvas.getContext("2d");
                
                // Optional: add a subtle background for transparency support
                ctx.fillStyle = "#FFFFFF";
                ctx.fillRect(0, 0, newWidth, newHeight);
                ctx.drawImage(img, 0, 0, newWidth, newHeight);
                
                // Convert to PNG with good quality (0.9 compression - PNG is lossless but size can be reduced via quality param in toDataURL)
                var pngBase64 = canvas.toDataURL("image/png", 0.9);
                var base64Data = pngBase64.split(",")[1];
                
                if (!base64Data) {
                    callback(new Error("Failed to convert image to PNG"), null);
                    return;
                }
                
                // Calculate approximate size in KB
                var sizeKB = Math.round(base64Data.length * 0.75 / 1024);
                var infoMsg = "✓ Converted to PNG (" + newWidth + "x" + newHeight + ", ~" + sizeKB + "KB)";
                callback(null, { base64: base64Data, width: newWidth, height: newHeight, sizeKB: sizeKB, info: infoMsg });
            };
            img.onerror = function() {
                callback(new Error("Invalid image file"), null);
            };
            img.src = ev.target.result;
        };
        reader.onerror = function() {
            callback(new Error("Failed to read file"), null);
        };
        reader.readAsDataURL(file);
    }
    
    function setupIcon() {
        var area = document.getElementById("iconUploadArea");
        var inp = document.getElementById("iconInput");
        var infoDiv = document.getElementById("iconInfo");
        
        area.onclick = function() { inp.click(); };
        inp.onchange = function(e) {
            var f = e.target.files[0];
            if (!f) return;
            
            // Check if file is an image
            if (!f.type.startsWith("image/")) {
                toast("Please select an image file (JPG, PNG, WEBP, GIF, etc.)");
                return;
            }
            
            // Show loading indicator
            if (infoDiv) infoDiv.innerHTML = "⏳ Processing image... (converting to PNG)";
            toast("Processing image...");
            
            // Process any image: resize to max 192px and convert to PNG
            resizeAndConvertToPNG(f, MAX_ICON_SIZE, function(err, result) {
                if (err) {
                    consoleLog("Icon processing error: " + err.message, true);
                    toast("Failed to process image: " + err.message);
                    if (infoDiv) infoDiv.innerHTML = "";
                    return;
                }
                
                // Success - save the PNG data
                appIconBase64 = result.base64;
                showIconPreview();
                if (infoDiv) {
                    infoDiv.innerHTML = result.info;
                    infoDiv.style.color = "#0fc";
                }
                saveAllToLocal();
                toast("Icon converted to PNG and saved (" + result.width + "x" + result.height + ")");
                consoleLog("Icon converted: " + result.info, false);
            });
        };
    }
    
    function showIconPreview() {
        var container = document.getElementById("iconPreviewContainer");
        if (container) {
            if (appIconBase64) {
                container.innerHTML = "<img src=\"data:image/png;base64," + appIconBase64 + "\" class=\"icon-preview-img\" alt=\"App Icon Preview\">";
            } else {
                container.innerHTML = "";
            }
        }
    }
