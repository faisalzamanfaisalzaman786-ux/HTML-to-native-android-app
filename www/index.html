<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Top-View Car Racing - Smart Controls</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }
        body {
            background: #111;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: #000;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
            overflow: hidden;
        }
        canvas {
            width: 100%;
            height: 100%;
            background: #222;
            display: block;
        }
        #ui {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            z-index: 10;
            pointer-events: none;
            background: rgba(0,0,0,0.6);
            padding: 10px;
            border-radius: 6px;
            border-left: 4px solid #00e676;
            line-height: 1.4;
        }
        #instruction {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: #aaa;
            font-size: 13px;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
            z-index: 10;
        }
        #startOverlay, #gameOverOverlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
            padding: 20px;
        }
        #gameOverOverlay {
            display: none;
            background: rgba(0,0,0,0.95);
        }
        .btn {
            margin-top: 20px;
            padding: 15px 45px;
            font-size: 20px;
            background: #00e676;
            color: black;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 5px #009624;
            transition: transform 0.1s;
        }
        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px #009624;
        }
        #gameOverOverlay .btn {
            background: #ff1744;
            box-shadow: 0 5px #b2102f;
            color: white;
        }
    </style>
</head>
<body>

<div id="gameContainer">
    <!-- Start Screen -->
    <div id="startOverlay">
        <h2>🏎️ Smart Controls Racing</h2>
        <p style="margin-top:10px; color:#aaa; font-size: 14px;">Tilt your mobile or slide your finger to steer</p>
        <button id="startBtn" class="btn">PLAY GAME 🏁</button>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverOverlay">
        <h2 style="color: #ff1744; font-size: 32px;">GAME OVER</h2>
        <p style="margin-top:10px; color:#aaa; font-size: 16px;">Final Score: <span id="finalScoreText">0</span></p>
        <button id="restartBtn" class="btn">TRY AGAIN 🔄</button>
    </div>

    <!-- HUD UI -->
    <div id="ui">
        SCORE: <span id="scoreText">0</span><br>
        SPEED: <span id="speedText">0</span> KM/H<br>
        LIVES: <span id="livesText">❤️❤️❤️</span>
    </div>

    <div id="instruction">Touch & hold anywhere to accelerate (GAS) + move left/right</div>
    
    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
        canvas.width = window.innerWidth > 450 ? 450 : window.innerWidth;
        canvas.height = window.innerHeight;
        player.y = canvas.height - 130;
    }

    let speed = 0;
    let maxSpeed = 16;
    let score = 0;
    let maxLives = 3;
    let lives = maxLives;
    let gameActive = false;
    let screenShake = 0;
    let roadOffset = 0;
    let animationFrameId = null;

    const player = {
        x: 200,
        y: 500,
        width: 40,
        height: 75,
        targetX: 200
    };

    let isTouching = false;
    let enemies = [];
    const enemyColors = ["#00b0ff", "#ffea00", "#e040fb", "#ff3d00"];

    // --- Audio System ---
    let audioCtx = null, mainOsc = null, subOsc = null, engineGain = null;

    function initAudio() {
        try {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            if (!mainOsc) {
                mainOsc = audioCtx.createOscillator();
                subOsc = audioCtx.createOscillator();
                engineGain = audioCtx.createGain();
                mainOsc.type = 'sawtooth'; subOsc.type = 'triangle';
                mainOsc.frequency.setValueAtTime(50, audioCtx.currentTime);
                subOsc.frequency.setValueAtTime(25, audioCtx.currentTime);
                engineGain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                mainOsc.connect(engineGain); subOsc.connect(engineGain);
                engineGain.connect(audioCtx.destination);
                mainOsc.start(); subOsc.start();
            }
        } catch(e) {}
    }

    function updateEngineSound() {
        if (!audioCtx || !mainOsc) return;
        let mainPitch = 50 + (speed * 12);
        let subPitch = 25 + (speed * 6);
        mainOsc.frequency.setTargetAtTime(mainPitch, audioCtx.currentTime, 0.05);
        subOsc.frequency.setTargetAtTime(subPitch, audioCtx.currentTime, 0.05);
        let vol = isTouching ? 0.08 : (speed > 0.1 ? 0.04 : 0.02);
        engineGain.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.1);
    }

    function playCrashSound() {
        if (!audioCtx) return;
        let bufferSize = audioCtx.sampleRate * 0.4;
        let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        let data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        let noise = audioCtx.createBufferSource(); noise.buffer = buffer;
        let filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass'; filter.frequency.setValueAtTime(300, audioCtx.currentTime);
        let noiseGain = audioCtx.createGain(); noiseGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        noiseGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        noise.connect(filter); filter.connect(noiseGain); noiseGain.connect(audioCtx.destination); noise.start();
    }

    // --- Controls ---
    player.targetX = canvas.width / 2 - player.width / 2;
    player.x = player.targetX;

    function handleMove(clientX) {
        if (!gameActive) return;
        const rect = canvas.getBoundingClientRect();
        let canvasX = clientX - rect.left;
        player.targetX = canvasX - player.width / 2;
    }

    window.addEventListener("touchstart", (e) => { isTouching = true; handleMove(e.touches[0].clientX); });
    window.addEventListener("touchmove", (e) => { handleMove(e.touches[0].clientX); });
    window.addEventListener("touchend", () => { isTouching = false; });

    window.addEventListener("mousedown", (e) => { isTouching = true; handleMove(e.clientX); });
    window.addEventListener("mousemove", (e) => { if(isTouching) handleMove(e.clientX); });
    window.addEventListener("mouseup", () => { isTouching = false; });

    if (window.DeviceOrientationEvent) {
        window.addEventListener("deviceorientation", (e) => {
            if (!gameActive || isTouching) return;
            let tilt = e.gamma; 
            if (tilt !== null && Math.abs(tilt) > 2) {
                player.targetX += tilt * 0.8;
            }
        }, true);
    }

    // --- Game Logic ---
    function spawnEnemy() {
        if (enemies.length < 4 && Math.random() < 0.02) {
            const laneWidth = 70;
            const lanes = [canvas.width/2 - 75, canvas.width/2 - 20, canvas.width/2 + 35];
            const randomLane = lanes[Math.floor(Math.random() * lanes.length)];
            
            if (!enemies.some(e => e.x === randomLane && e.y < 200)) {
                enemies.push({
                    x: randomLane,
                    y: -100,
                    width: 38,
                    height: 72,
                    color: enemyColors[Math.floor(Math.random() * enemyColors.length)],
                    speed: Math.random() * 2 + 3
                });
            }
        }
    }

    function checkCollision(rect1, rect2) {
        return rect1.x < rect2.x + rect2.width && rect1.x + rect1.width > rect2.x &&
               rect1.y < rect2.y + rect2.height && rect1.y + rect1.height > rect2.y;
    }

    function drawRoad() {
        ctx.fillStyle = "#2e7d32"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        let roadWidth = 240;
        let roadX = (canvas.width - roadWidth) / 2;
        ctx.fillStyle = "#37474f"; ctx.fillRect(roadX, 0, roadWidth, canvas.height);

        let curb = 40;
        for (let i = -curb; i < canvas.height + curb; i += curb) {
            let yPos = i + (roadOffset % curb);
            ctx.fillStyle = (Math.floor((i + roadOffset) / curb) % 2 === 0) ? "#eceff1" : "#d32f2f";
            ctx.fillRect(roadX - 10, yPos, 10, curb);
            ctx.fillRect(roadX + roadWidth, yPos, 10, curb);
        }
    }

    function drawCar(car, isPlayer) {
        ctx.fillStyle = "rgba(0,0,0,0.25)";
        ctx.fillRect(car.x + 4, car.y + 4, car.width, car.height);
        ctx.fillStyle = isPlayer ? "#ff1744" : car.color;
        ctx.fillRect(car.x, car.y, car.width, car.height);
        
        ctx.fillStyle = "#111";
        ctx.fillRect(car.x - 3, car.y + 10, 3, 12); ctx.fillRect(car.x + car.width, car.y + 10, 3, 12);
        ctx.fillRect(car.x - 3, car.y + 50, 3, 12); ctx.fillRect(car.x + car.width, car.y + 50, 3, 12);

        ctx.fillRect(car.x + 4, car.y + 20, car.width - 8, 22);
        ctx.fillStyle = isPlayer ? "#80deea" : "#cfd8dc";
        ctx.fillRect(car.x + 6, car.y + 22, car.width - 12, 6);
    }

    function updateLivesUI() {
        let hearts = "";
        for(let i=0; i<maxLives; i++) {
            hearts += (i < lives) ? "❤️" : "🖤";
        }
        document.getElementById("livesText").innerText = hearts;
    }

    function triggerGameOver() {
        gameActive = false;
        cancelAnimationFrame(animationFrameId);
        document.getElementById("finalScoreText").innerText = score;
        document.getElementById("gameOverOverlay").style.display = "flex";
        if (engineGain) engineGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
    }

    function update() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (isTouching) {
            if (speed < maxSpeed) speed += 0.15;
        } else {
            if (speed > 0) speed -= 0.12;
        }
        if (speed < 0) speed = 0;

        roadOffset += speed;
        updateEngineSound();

        if (speed > 0.2) {
            score += Math.floor(speed / 5);
            let diff = player.targetX - player.x;
            player.x += diff * 0.15;

            let roadWidth = 240;
            let minX = (canvas.width - roadWidth) / 2 + 5;
            let maxX = minX + roadWidth - player.width - 10;
            if (player.x < minX) player.x = minX;
            if (player.x > maxX) player.x = maxX;
        }

        spawnEnemy();

        ctx.save();
        if (screenShake > 0) {
            ctx.translate((Math.random() - 0.5) * screenShake, (Math.random() - 0.5) * screenShake);
            screenShake *= 0.85;
        }

        drawRoad();

        for (let i = enemies.length - 1; i >= 0; i--) {
            enemies[i].y += speed - enemies[i].speed;

            if (checkCollision(player, enemies[i])) {
                playCrashSound();
                speed = 0; 
                screenShake = 15;
                score = Math.max(0, score - 100);
                enemies.splice(i, 1);
                
                lives--;
                updateLivesUI();
                
                if (lives <= 0) {
                    triggerGameOver();
                    ctx.restore();
                    return;
                }
                continue;
            }

            if (enemies[i].y > canvas.height) {
                enemies.splice(i, 1);
            } else {
                drawCar(enemies[i], false);
            }
        }

        drawCar(player, true);
        ctx.restore();

        document.getElementById("scoreText").innerText = score;
        document.getElementById("speedText").innerText = Math.floor(speed * 16);

        animationFrameId = requestAnimationFrame(update);
    }

    function startGame() {
        document.getElementById("startOverlay").style.display = "none";
        document.getElementById("gameOverOverlay").style.display = "none";
        score = 0;
        speed = 0;
        lives = maxLives;
        enemies = [];
        player.targetX = canvas.width / 2 - player.width / 2;
        player.x = player.targetX;
        gameActive = true;
        updateLivesUI();
        resizeCanvas();
        initAudio();
        update();
    }

    document.getElementById("startBtn").addEventListener("click", startGame);
    document.getElementById("restartBtn").addEventListener("click", startGame);

    window.addEventListener("resize", resizeCanvas);
</script>

</body>
</html>
