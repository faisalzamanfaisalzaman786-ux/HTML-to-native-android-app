<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Permission Tester Pro - Auto Grant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 16px;
            min-height: 100vh;
        }

        .container {
            max-width: 550px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 16px;
            background: rgba(255,255,255,0.1);
            border-radius: 24px;
            margin-bottom: 16px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            color: #4ade80;
            font-size: 22px;
        }

        .header p {
            color: #94a3b8;
            font-size: 11px;
            margin-top: 4px;
        }

        /* Progress Section */
        .progress-section {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .progress-bar-container {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #4ade80, #22c55e);
            border-radius: 20px;
            transition: width 0.3s ease;
        }

        .current-perm {
            text-align: center;
            font-size: 12px;
            color: #4ade80;
            margin-top: 8px;
        }

        /* Permission Grid */
        .perm-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .perm-card {
            background: rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.2s;
        }

        .perm-card.granted {
            background: rgba(74, 222, 128, 0.15);
            border-color: rgba(74, 222, 128, 0.4);
        }

        .perm-card.denied {
            background: rgba(248, 113, 113, 0.1);
            border-color: rgba(248, 113, 113, 0.3);
        }

        .perm-card.pending {
            background: rgba(245, 158, 11, 0.1);
            border-color: rgba(245, 158, 11, 0.3);
        }

        .perm-icon {
            font-size: 24px;
            margin-bottom: 8px;
            display: inline-block;
        }

        .perm-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 4px;
            color: #e2e8f0;
        }

        .perm-name {
            font-size: 9px;
            font-family: monospace;
            color: #94a3b8;
            word-break: break-all;
            margin-bottom: 6px;
        }

        .perm-status {
            font-size: 10px;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 20px;
            display: inline-block;
        }

        .status-badge-granted {
            background: rgba(74, 222, 128, 0.2);
            color: #4ade80;
        }

        .status-badge-denied {
            background: rgba(248, 113, 113, 0.2);
            color: #f87171;
        }

        .status-badge-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #facc15;
        }

        .status-badge-unknown {
            background: rgba(148, 163, 184, 0.2);
            color: #94a3b8;
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-bottom: 10px;
            transition: transform 0.1s;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(59, 130, 246, 0.2);
            border: 1px solid #3b82f6;
            color: #3b82f6;
            padding: 10px;
            border-radius: 40px;
            width: 100%;
            cursor: pointer;
        }

        /* Log Area */
        .log-area {
            background: rgba(0,0,0,0.5);
            border-radius: 16px;
            padding: 10px;
            font-family: monospace;
            font-size: 10px;
            max-height: 150px;
            overflow-y: auto;
            margin-top: 12px;
        }

        .log-entry {
            padding: 3px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            color: #94a3b8;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: #4ade80;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 11px;
            transition: transform 0.3s;
            z-index: 1000;
            border-left: 3px solid #4ade80;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .summary-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.3);
            border-radius: 40px;
            padding: 8px 16px;
            margin-bottom: 16px;
        }

        .summary-count {
            font-size: 12px;
        }

        .summary-count span {
            font-weight: bold;
            font-size: 16px;
        }

        .granted-count { color: #4ade80; }
        .denied-count { color: #f87171; }
        .pending-count { color: #facc15; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Permission Tester Pro</h1>
            <p>Auto-request all permissions in sequence</p>
        </div>

        <!-- Progress Section -->
        <div class="progress-section">
            <div class="progress-bar-container">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="current-perm" id="currentPermLabel">Click "Grant All Permissions" to start</div>
        </div>

        <!-- Summary -->
        <div class="summary-bar">
            <div class="summary-count">✅ Granted: <span id="grantedCount" class="granted-count">0</span></div>
            <div class="summary-count">❌ Denied: <span id="deniedCount" class="denied-count">0</span></div>
            <div class="summary-count">⏳ Pending: <span id="pendingCount" class="pending-count">0</span></div>
        </div>

        <!-- Permission Grid -->
        <div class="perm-grid" id="permGrid">
            <!-- Will be populated by JavaScript -->
        </div>

        <!-- Action Buttons -->
        <button id="grantAllBtn" class="btn-primary">
            🚀 Grant All Permissions (Auto Sequence)
        </button>
        <button id="resetBtn" class="btn-secondary">
            🔄 Reset & Check Status
        </button>

        <!-- Log Area -->
        <div class="log-area" id="logArea">
            <div class="log-entry">● Ready. Click "Grant All Permissions"</div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // Add FontAwesome
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css';
        document.head.appendChild(link);

        // Permission definitions
        const PERMISSIONS = [
            { id: 'camera', name: 'CAMERA', icon: '📷', plugin: 'Camera', method: 'testCamera' },
            { id: 'microphone', name: 'RECORD_AUDIO', icon: '🎤', plugin: 'Microphone', method: 'testMicrophone' },
            { id: 'location', name: 'ACCESS_FINE_LOCATION', icon: '📍', plugin: 'Geolocation', method: 'testLocation' },
            { id: 'readStorage', name: 'READ_EXTERNAL_STORAGE', icon: '📂', plugin: 'Filesystem', method: 'testReadStorage' },
            { id: 'writeStorage', name: 'WRITE_EXTERNAL_STORAGE', icon: '💾', plugin: 'Filesystem', method: 'testWriteStorage' },
            { id: 'notifications', name: 'POST_NOTIFICATIONS', icon: '🔔', plugin: 'Notification', method: 'testNotification' },
            { id: 'contacts', name: 'READ_CONTACTS', icon: '📞', plugin: 'Contacts', method: 'testContacts' },
            { id: 'sensors', name: 'BODY_SENSORS', icon: '❤️', plugin: 'Motion', method: 'testSensors' }
        ];

        let permissionStatus = {};
        let isRequesting = false;
        let currentIndex = 0;

        const isCapacitor = typeof Capacitor !== 'undefined';

        // Helper functions
        function addLog(message, isError = false) {
            const logArea = document.getElementById('logArea');
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.style.color = isError ? '#f87171' : '#4ade80';
            const time = new Date().toLocaleTimeString();
            entry.innerHTML = '[' + time + '] ' + message;
            logArea.appendChild(entry);
            entry.scrollIntoView();
            while (logArea.children.length > 50) {
                logArea.removeChild(logArea.firstChild);
            }
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.borderLeftColor = isError ? '#f87171' : '#4ade80';
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function updateUI() {
            const grid = document.getElementById('permGrid');
            grid.innerHTML = '';
            
            let granted = 0, denied = 0, pending = 0;
            
            PERMISSIONS.forEach((perm, index) => {
                const status = permissionStatus[perm.id] || 'unknown';
                if (status === 'granted') granted++;
                else if (status === 'denied') denied++;
                else if (status === 'pending') pending++;
                
                const statusClass = status === 'granted' ? 'granted' : (status === 'denied' ? 'denied' : 'pending');
                const statusText = status === 'granted' ? '✅ Granted' : (status === 'denied' ? '❌ Denied' : '⏳ Pending');
                const statusBadgeClass = status === 'granted' ? 'status-badge-granted' : (status === 'denied' ? 'status-badge-denied' : 'status-badge-pending');
                
                const card = document.createElement('div');
                card.className = `perm-card ${status === 'granted' ? 'granted' : (status === 'denied' ? 'denied' : 'pending')}`;
                card.id = `perm-card-${perm.id}`;
                card.innerHTML = `
                    <div class="perm-icon">${perm.icon}</div>
                    <div class="perm-title">${perm.name.split('_').pop()}</div>
                    <div class="perm-name">${perm.name}</div>
                    <div class="perm-status ${statusBadgeClass}">${statusText}</div>
                `;
                grid.appendChild(card);
            });
            
            document.getElementById('grantedCount').innerText = granted;
            document.getElementById('deniedCount').innerText = denied;
            document.getElementById('pendingCount').innerText = pending;
            
            const progress = ((granted + denied) / PERMISSIONS.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function updateSinglePermUI(permId, status) {
            permissionStatus[permId] = status;
            const card = document.getElementById(`perm-card-${permId}`);
            if (card) {
                const statusClass = status === 'granted' ? 'granted' : (status === 'denied' ? 'denied' : 'pending');
                const statusText = status === 'granted' ? '✅ Granted' : (status === 'denied' ? '❌ Denied' : '⏳ Pending');
                const statusBadgeClass = status === 'granted' ? 'status-badge-granted' : (status === 'denied' ? 'status-badge-denied' : 'status-badge-pending');
                card.className = `perm-card ${statusClass}`;
                const statusDiv = card.querySelector('.perm-status');
                if (statusDiv) {
                    statusDiv.className = `perm-status ${statusBadgeClass}`;
                    statusDiv.innerText = statusText;
                }
            }
            
            let granted = 0, denied = 0;
            Object.values(permissionStatus).forEach(s => {
                if (s === 'granted') granted++;
                else if (s === 'denied') denied++;
            });
            document.getElementById('grantedCount').innerText = granted;
            document.getElementById('deniedCount').innerText = denied;
            document.getElementById('pendingCount').innerText = PERMISSIONS.length - granted - denied;
            
            const progress = ((granted + denied) / PERMISSIONS.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        // Permission test functions
        async function testCamera() {
            if (!isCapacitor) return false;
            try {
                await Capacitor.Plugins.Camera.getPhoto({ quality: 50, allowEditing: false, resultType: 'uri' });
                return true;
            } catch(e) { return false; }
        }

        async function testMicrophone() {
            try {
                if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    stream.getTracks().forEach(t => t.stop());
                    return true;
                }
                return false;
            } catch(e) { return false; }
        }

        async function testLocation() {
            try {
                await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject);
                });
                return true;
            } catch(e) { return false; }
        }

        async function testReadStorage() {
            if (!isCapacitor || !Capacitor.Plugins.Filesystem) return false;
            try {
                await Capacitor.Plugins.Filesystem.readdir({ path: 'Documents' });
                return true;
            } catch(e) { return false; }
        }

        async function testWriteStorage() {
            if (!isCapacitor || !Capacitor.Plugins.Filesystem) return false;
            try {
                await Capacitor.Plugins.Filesystem.writeFile({ path: 'test.txt', data: 'Test' });
                return true;
            } catch(e) { return false; }
        }

        async function testNotification() {
            try {
                if (Notification.permission === 'granted') {
                    return true;
                } else if (Notification.permission !== 'denied') {
                    const permission = await Notification.requestPermission();
                    return permission === 'granted';
                }
                return false;
            } catch(e) { return false; }
        }

        async function testContacts() {
            if (!isCapacitor || !Capacitor.Plugins.Contacts) return false;
            try {
                await Capacitor.Plugins.Contacts.getContacts();
                return true;
            } catch(e) { return false; }
        }

        async function testSensors() {
            return new Promise((resolve) => {
                if (window.DeviceMotionEvent) {
                    const handler = (e) => {
                        if (e.acceleration) {
                            window.removeEventListener('devicemotion', handler);
                            resolve(true);
                        }
                    };
                    window.addEventListener('devicemotion', handler);
                    setTimeout(() => {
                        window.removeEventListener('devicemotion', handler);
                        resolve(false);
                    }, 2000);
                } else {
                    resolve(false);
                }
            });
        }

        async function requestSinglePermission(perm, index) {
            document.getElementById('currentPermLabel').innerHTML = `📌 Requesting: ${perm.icon} ${perm.name} (${index + 1}/${PERMISSIONS.length})`;
            updateSinglePermUI(perm.id, 'pending');
            
            // Request permission first
            if (isCapacitor && Capacitor.Plugins[perm.plugin]) {
                try {
                    await Capacitor.Plugins[perm.plugin].requestPermissions();
                } catch(e) {}
            }
            
            // Wait a bit
            await new Promise(r => setTimeout(r, 800));
            
            // Test the permission
            let granted = false;
            switch (perm.method) {
                case 'testCamera': granted = await testCamera(); break;
                case 'testMicrophone': granted = await testMicrophone(); break;
                case 'testLocation': granted = await testLocation(); break;
                case 'testReadStorage': granted = await testReadStorage(); break;
                case 'testWriteStorage': granted = await testWriteStorage(); break;
                case 'testNotification': granted = await testNotification(); break;
                case 'testContacts': granted = await testContacts(); break;
                case 'testSensors': granted = await testSensors(); break;
            }
            
            if (granted) {
                updateSinglePermUI(perm.id, 'granted');
                addLog(`✅ ${perm.icon} ${perm.name} - GRANTED`, false);
            } else {
                updateSinglePermUI(perm.id, 'denied');
                addLog(`❌ ${perm.icon} ${perm.name} - DENIED`, true);
            }
            
            return granted;
        }

        async function grantAllPermissions() {
            if (isRequesting) {
                showToast('Already requesting permissions...', true);
                return;
            }
            
            isRequesting = true;
            const btn = document.getElementById('grantAllBtn');
            btn.disabled = true;
            btn.innerHTML = '⏳ Requesting Permissions...';
            
            addLog('🚀 Starting auto-grant sequence...', false);
            
            for (let i = 0; i < PERMISSIONS.length; i++) {
                await requestSinglePermission(PERMISSIONS[i], i);
                await new Promise(r => setTimeout(r, 500));
            }
            
            document.getElementById('currentPermLabel').innerHTML = '✅ All permissions processed!';
            addLog('🎉 Permission sequence completed!', false);
            showToast('Permission check completed!');
            
            btn.disabled = false;
            btn.innerHTML = '🚀 Grant All Permissions (Auto Sequence)';
            isRequesting = false;
        }

        async function checkAllPermissions() {
            addLog('🔍 Checking all permissions status...', false);
            
            for (let i = 0; i < PERMISSIONS.length; i++) {
                const perm = PERMISSIONS[i];
                document.getElementById('currentPermLabel').innerHTML = `🔍 Checking: ${perm.icon} ${perm.name}`;
                
                let granted = false;
                switch (perm.method) {
                    case 'testCamera': granted = await testCamera(); break;
                    case 'testMicrophone': granted = await testMicrophone(); break;
                    case 'testLocation': granted = await testLocation(); break;
                    case 'testReadStorage': granted = await testReadStorage(); break;
                    case 'testWriteStorage': granted = await testWriteStorage(); break;
                    case 'testNotification': granted = await testNotification(); break;
                    case 'testContacts': granted = await testContacts(); break;
                    case 'testSensors': granted = await testSensors(); break;
                }
                
                updateSinglePermUI(perm.id, granted ? 'granted' : 'denied');
                await new Promise(r => setTimeout(r, 200));
            }
            
            document.getElementById('currentPermLabel').innerHTML = '✅ Status check completed!';
            addLog('✅ Status check completed!', false);
        }

        // Initialize
        function init() {
            PERMISSIONS.forEach(perm => {
                permissionStatus[perm.id] = 'unknown';
            });
            updateUI();
            
            if (!isCapacitor) {
                addLog('⚠️ Running in browser. Some features may not work.', true);
            } else {
                addLog('✅ Capacitor detected. Auto-grant feature ready!', false);
            }
            
            document.getElementById('grantAllBtn').onclick = grantAllPermissions;
            document.getElementById('resetBtn').onclick = checkAllPermissions;
        }
        
        init();
    </script>
</body>
</html>
