name: System Pro Hybrid Builder

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Initialize Hybrid Project
        run: |
          mkdir www
          # Decoding Payload HTML to Web Folder
          echo "${{ github.event.client_payload.source_files.html_code }}" | base64 -d > www/index.html
          
          # Setup Capacitor
          npm init -y
          npm install @capacitor/cli @capacitor/android
          npx cap init "${{ github.event.client_payload.build_config.app_display_name }}" "${{ github.event.client_payload.build_config.package_name }}" --web-dir www
          npx cap add android

      - name: 📸 Inject App Icon
        if: github.event.client_payload.assets.app_icon_base64 != ''
        run: |
          echo "${{ github.event.client_payload.assets.app_icon_base64 }}" | base64 -d > icon.png
          # Overwriting default icons
          RES="android/app/src/main/res"
          cp icon.png $RES/mipmap-mdpi/ic_launcher.png
          cp icon.png $RES/mipmap-hdpi/ic_launcher.png
          cp icon.png $RES/mipmap-xhdpi/ic_launcher.png
          cp icon.png $RES/mipmap-xxhdpi/ic_launcher.png
          cp icon.png $RES/mipmap-xxxhdpi/ic_launcher.png

      - name: 🔧 Force Permissions & Flashlight Support
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Essential Permissions
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.CAMERA" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.FLASHLIGHT" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-feature android:name="android.hardware.camera.flash" android:required="false" />' $MANIFEST
          # Storage & Audio
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.RECORD_AUDIO" />' $MANIFEST

      - name: 🏗️ Sync & Build
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.client_payload.build_config.app_display_name }}-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
