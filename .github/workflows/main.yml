name: Build Android APK using Capacitor

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/cli @capacitor/android

      # -------------------------------
      # 👇 یہاں آپ کا HTML + Icon تیار کریں
      # (آپ کے پاس پہلے سے موجود فائلز استعمال ہوں گی)
      # -------------------------------
      - name: 📁 Prepare Web Assets
        run: |
          mkdir -p www
          # فرض کریں HTML اور Icon ریپو میں موجود ہیں
          # اگر نہیں تو انہیں پہلے سے اپلوڈ کریں
          cp index.html www/ 2>/dev/null || echo "<h1>Demo</h1>" > www/index.html
          cp icon.png www/ 2>/dev/null || true

      - name: 🧹 Initialize Capacitor Project
        run: |
          npx cap init "MyApp" "com.yourapp.package" --web-dir www
          npx cap add android

      # -------------------------------------------------
      # 🚨 KOTLIN CONFLICT FIX – ڈپلیکیٹ کلاسز کا حل
      # -------------------------------------------------
      - name: 🔧 Fix Kotlin Duplicate Classes
        run: |
          cd android
          # Force Kotlin unified version in root build.gradle
          cat >> build.gradle <<'EOF'

          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22"
                  }
              }
          }
          EOF

          # اپ ڈیٹ app/build.gradle – Kotlin ورشن سیٹ کریں
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.22"/' build.gradle
          
          # مزید تصادم سے بچنے کے لیے exclude transitive dependencies
          cat >> app/build.gradle <<'EOF2'

          dependencies {
              implementation('org.jetbrains.kotlin:kotlin-stdlib-jdk8:$kotlin_version') {
                  exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib'
              }
          }
          EOF2

      # ✅ تمام ضروری پرمیشنز شامل کریں (کیمرہ، انٹرنیٹ، اسٹوریج، فلاش لائٹ)
      - name: 🔐 Add All Permissions to AndroidManifest.xml
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # پہلے ڈپلیکیٹ warnings سے بچنے کے لیے پرانی لائنز ہٹائیں (اگر ہوں)
          sed -i '/uses-permission android:name="android.permission.INTERNET"/d' $MANIFEST
          # تمام پرمیشنز شامل کریں
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.CAMERA" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.FLASHLIGHT" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.RECORD_AUDIO" />' $MANIFEST

      - name: 🔄 Sync Capacitor & Build APK
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
