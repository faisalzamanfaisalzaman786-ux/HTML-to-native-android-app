name: Build Android APK using Capacitor

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/cli @capacitor/android

      # 👇 درست پیکیج نام (Java keyword سے پاک)
      - name: 🏷️ Set valid package name
        id: vars
        run: |
          # یہاں آپ اپنی مرضی کا درست نام لکھ سکتے ہیں
          echo "APP_ID=com.mywebapp.publisher" >> $GITHUB_ENV

      - name: 📁 Prepare Web Assets
        run: |
          mkdir -p www
          # اگر index.html ریپو میں موجود ہے تو کاپی کریں، ورنہ ڈیمو فائل
          cp index.html www/ 2>/dev/null || echo "<h1>Web App</h1>" > www/index.html
          cp icon.png www/ 2>/dev/null || true

      - name: 🧹 Initialize Capacitor Project (valid name)
        run: |
          npx cap init "MyApp" "${{ env.APP_ID }}" --web-dir www
          npx cap add android

      # 🔧 Force compileSdkVersion اور namespace درست کریں
      - name: 🛠️ Fix build.gradle (compileSdk & namespace)
        run: |
          cd android
          # app/build.gradle میں compileSdkVersion شامل کریں (اگر نہ ہو)
          sed -i '/android {/a\    compileSdkVersion 34' app/build.gradle
          # targetSdkVersion بھی شامل کر دیں
          sed -i '/android {/a\    targetSdkVersion 34' app/build.gradle
          # minSdkVersion 21 set کریں
          sed -i '/android {/a\    minSdkVersion 21' app/build.gradle
          
          # namespace کو درست کریں (اگر غلط ہو تو)
          sed -i "s/namespace '.*'/namespace '${{ env.APP_ID }}'/" app/build.gradle

      # 🚨 Kotlin ڈپلیکیٹ کلاسز کا حل (پہلے والا طریقہ)
      - name: 🔧 Fix Kotlin Duplicate Classes
        run: |
          cd android
          cat >> build.gradle <<'EOF'

          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22"
                  }
              }
          }
          EOF
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.22"/' build.gradle

      # ✅ تمام پرمیشنز شامل کریں
      - name: 🔐 Add All Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # پہلے موجود permission لائنز ہٹائیں (ڈپلیکیٹ سے بچنے کے لیے)
          sed -i '/uses-permission/d' $MANIFEST
          # نئی پرمیشنز شامل کریں
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.CAMERA" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.FLASHLIGHT" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.RECORD_AUDIO" />' $MANIFEST

      - name: 🔄 Sync Capacitor & Build APK
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
