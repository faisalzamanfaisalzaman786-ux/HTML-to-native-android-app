name: System Pro Dispatch Builder

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'

      - name: Extract Payload Data
        run: |
          echo "PKG_NAME=${{ github.event.client_payload.build_config.package_name }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.build_config.app_display_name }}" >> $GITHUB_ENV

      - name: Create Flutter Project
        run: |
          rm -rf ./*
          flutter create --org "com.systempro" --project-name "app" --platforms android .
          mkdir -p assets
          echo "Project structure initialized"

      - name: Inject HTML Source
        run: |
          # Decoding Base64 HTML from Dispatch Payload
          echo "${{ github.event.client_payload.source_files.html_code }}" | base64 -d > assets/index.html

      - name: Inject App Icon
        if: github.event.client_payload.assets.app_icon_base64 != ''
        run: |
          # Decoding Base64 Icon from Dispatch Payload
          echo "${{ github.event.client_payload.assets.app_icon_base64 }}" | base64 -d > assets/icon.png

      - name: Update Pubspec
        run: |
          cat <<EOF > pubspec.yaml
          name: app
          description: System Pro Hybrid App
          publish_to: 'none'
          version: 1.0.0+1
          environment:
            sdk: '>=3.0.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.10.1
          flutter:
            uses-material-design: true
            assets:
              - assets/index.html
          EOF
          flutter pub get

      - name: Configure Android Manifest (Permissions)
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Adding permissions for Torch and Camera
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.CAMERA" />' $MANIFEST
          sed -i '/<manifest/a \    <uses-feature android:name="android.hardware.camera.flash" />' $MANIFEST
          # Update App Name
          sed -i 's/android:label="[^"]*"/android:label="${{ env.APP_NAME }}"/' $MANIFEST

      - name: Set Package Name & Gradle Lock
        run: |
          GRADLE="android/app/build.gradle"
          sed -i 's/applicationId ".*"/applicationId "${{ env.PKG_NAME }}"/' $GRADLE
          # Force Gradle 8.5 Stability
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' $GRADLE
          sed -i 's/targetSdkVersion .*/targetSdkVersion 34/' $GRADLE

      - name: Build APK
        run: flutter build apk --release

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-Release
          path: build/app/outputs/flutter-apk/app-release.apk
