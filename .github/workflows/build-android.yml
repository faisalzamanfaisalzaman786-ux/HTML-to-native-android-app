name: Dynamic APK Builder (Safe V2)

on:
  workflow_dispatch:
    inputs:
      build_config:
        description: 'Build config (JSON)'
        required: true
        default: '{"package_name":"com.example.app","app_display_name":"MyApp","min_sdk":21,"target_sdk":34,"use_proguard":false}'
      source_files:
        description: 'Source files (JSON with base64)'
        required: true
        default: '{"main_dart":"","pubspec":""}'
      permissions:
        description: 'Permissions JSON'
        required: true
        default: '{"camera":false,"microphone":false,"vibrate":false,"location_granularity":"none"}'
      assets:
        description: 'Assets JSON (icon and additional)'
        required: true
        default: '{"app_icon_base64":"","additional_assets":[]}'
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.2'
          channel: 'stable'

      - name: Save payload to file
        run: echo '${{ toJson(github.event.client_payload) }}' > payload.json

      - name: Extract build config
        run: |
          PACKAGE_NAME=$(jq -r '.build_config.package_name' payload.json)
          APP_NAME=$(jq -r '.build_config.app_display_name' payload.json)
          MIN_SDK=$(jq -r '.build_config.min_sdk' payload.json)
          TARGET_SDK=$(jq -r '.build_config.target_sdk' payload.json)
          USE_PROGUARD=$(jq -r '.build_config.use_proguard' payload.json)
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
          echo "MIN_SDK=$MIN_SDK" >> $GITHUB_ENV
          echo "TARGET_SDK=$TARGET_SDK" >> $GITHUB_ENV
          echo "USE_PROGUARD=$USE_PROGUARD" >> $GITHUB_ENV

      - name: Create fresh Flutter v2 project
        run: |
          PKG="${{ env.PACKAGE_NAME }}"
          ORG=$(echo "$PKG" | rev | cut -d. -f2- | rev)
          PROJ=$(echo "$PKG" | rev | cut -d. -f1 | rev)
          rm -rf android ios .dart_tool build
          flutter create --org "$ORG" --project-name "$PROJ" --platforms=android,ios .

      - name: Write main.dart
        run: jq -r '.source_files.main_dart // ""' payload.json | base64 -d > lib/main.dart

      - name: Write pubspec.yaml (hardcoded correct versions)
        run: |
          cat > pubspec.yaml <<EOF
          name: system_pro_app
          description: A powerful browser app with camera support.
          version: 1.0.0+1
          environment:
            sdk: '>=3.4.0 <4.0.0'
          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: 4.13.0
            webview_flutter_android: 4.10.1
            permission_handler: 12.0.1
            path_provider: 2.1.5
            device_info_plus: 10.1.0
          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^5.0.0
          flutter:
            uses-material-design: true
          EOF

      - name: Add dependencies
        run: |
          flutter pub get
          flutter pub add webview_flutter:4.13.0 webview_flutter_android:4.10.1 permission_handler:12.0.1 path_provider:2.1.5 device_info_plus:10.1.0 2>/dev/null || true
          flutter pub get

      - name: Extract permissions and icon
        run: |
          jq '.permissions' payload.json > perms.json
          jq '.assets.additional_assets // []' payload.json > assets_list.json
          ICON_B64=$(jq -r '.assets.app_icon_base64 // ""' payload.json)
          echo "ICON_B64=$ICON_B64" >> $GITHUB_ENV

      # ============================================================
      # ✅ نیا مرحلہ: آئیکن کی توثیق (validation) اور معلومات
      # ============================================================
      - name: Validate icon data
        run: |
          if [ -n "${{ env.ICON_B64 }}" ] && [ "${{ env.ICON_B64 }}" != "null" ]; then
            ICON_LEN=$(echo -n "${{ env.ICON_B64 }}" | wc -c)
            echo "✅ Icon base64 received. Length: $ICON_LEN characters."
            # Try to decode a small part to check if it's valid base64
            if echo "${{ env.ICON_B64 }}" | base64 -d > /dev/null 2>&1; then
              echo "✅ Icon base64 appears valid (decoding succeeded)."
            else
              echo "⚠️ Warning: Icon base64 decoding failed. The icon may be corrupt."
            fi
          else
            echo "⚠️ No icon provided (ICON_B64 is empty or null). APK will use default Android icon."
          fi

      - name: Apply permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          for perm in INTERNET POST_NOTIFICATIONS; do
            if ! grep -q "android.permission.$perm" "$MANIFEST"; then
              sed -i "/<manifest/a \    <uses-permission android:name=\"android.permission.$perm\" />" "$MANIFEST"
            fi
          done
          add_perm() { if ! grep -q "$2" "$MANIFEST"; then sed -i "/<manifest/a \    $1" "$MANIFEST"; fi; }
          if jq -e '.camera == true' perms.json > /dev/null; then add_perm '<uses-permission android:name="android.permission.CAMERA" />' 'CAMERA'; fi
          if jq -e '.microphone == true' perms.json > /dev/null; then add_perm '<uses-permission android:name="android.permission.RECORD_AUDIO" />' 'RECORD_AUDIO'; fi
          if jq -e '.vibrate == true' perms.json > /dev/null; then add_perm '<uses-permission android:name="android.permission.VIBRATE" />' 'VIBRATE'; fi
          LOC=$(jq -r '.location_granularity // "none"' perms.json)
          if [ "$LOC" = "fine" ]; then add_perm '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' 'ACCESS_FINE_LOCATION'; fi
          if [ "$LOC" = "coarse" ]; then add_perm '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' 'ACCESS_COARSE_LOCATION'; fi

      - name: Set app display name
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:label="[^"]*"/android:label="${{ env.APP_NAME }}"/' "$MANIFEST"

      - name: Apply app icon (with explicit feedback)
        run: |
          if [ -n "${{ env.ICON_B64 }}" ] && [ "${{ env.ICON_B64 }}" != "null" ]; then
            echo "${{ env.ICON_B64 }}" | base64 -d > icon.png
            if [ -s icon.png ]; then
              for density in hdpi mdpi xhdpi xxhdpi xxxhdpi; do
                mkdir -p android/app/src/main/res/mipmap-$density
                cp icon.png android/app/src/main/res/mipmap-$density/ic_launcher.png
              done
              rm icon.png
              echo "✅ App icon successfully applied to all densities."
            else
              echo "❌ Error: Decoded icon.png is empty. Icon not applied."
              exit 1
            fi
          else
            echo "⚠️ Skipping icon application because no icon was provided."
          fi

      - name: Apply additional assets
        run: |
          if jq -e 'length > 0' assets_list.json > /dev/null; then
            mkdir -p assets/images
            for row in $(jq -r '.[] | @base64' assets_list.json); do
              _jq() { echo ${row} | base64 --decode | jq -r ${1}; }
              NAME=$(_jq '.name')
              B64=$(_jq '.base64')
              echo "$B64" | base64 -d > "assets/images/$NAME"
            done
            if ! grep -q "assets/" pubspec.yaml; then
              sed -i '/flutter:/a \  assets:\n    - assets/images/' pubspec.yaml
            fi
            echo "✅ Additional assets added"
          fi

      - name: Configure Gradle and Kotlin
        run: |
          GRADLE="android/app/build.gradle.kts"
          PKG="${{ env.PACKAGE_NAME }}"
          sed -i '/android {/a \    compileOptions {\n        sourceCompatibility = JavaVersion.VERSION_17\n        targetCompatibility = JavaVersion.VERSION_17\n    }' "$GRADLE"
          sed -i '/android {/a \    namespace("'"$PKG"'")' "$GRADLE"
          sed -i '/defaultConfig {/a \        applicationId = "'"$PKG"'"' "$GRADLE"
          sed -i '/android {/a \    ndkVersion = "27.0.12077973"' "$GRADLE"
          sed -i 's/minSdk = .*/minSdk = '"${{ env.MIN_SDK }}"'/' "$GRADLE"
          sed -i 's/targetSdk = .*/targetSdk = '"${{ env.TARGET_SDK }}"'/' "$GRADLE"
          if ! grep -q 'android:usesCleartextTraffic="true"' "android/app/src/main/AndroidManifest.xml"; then
            sed -i 's/<application /<application android:usesCleartextTraffic="true" /' "android/app/src/main/AndroidManifest.xml"
          fi
          SETTINGS="android/settings.gradle.kts"
          sed -i 's/id "org.jetbrains.kotlin.android" version ".*"/id "org.jetbrains.kotlin.android" version "2.0.20"/' "$SETTINGS"
          cat > android/gradle.properties <<EOF
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.enableJetifier=true
          kotlin.code.style=official
          EOF
          sed -i '/kotlin-stdlib/d' "$GRADLE"
          sed -i "/dependencies {/a \    implementation(\"org.jetbrains.kotlin:kotlin-stdlib:2.0.20\")" "$GRADLE"
          if ! grep -q "kotlinOptions" "$GRADLE"; then
            sed -i '/android {/a \    kotlinOptions {\n        jvmTarget = "17"\n    }' "$GRADLE"
          else
            sed -i 's/jvmTarget = .*/jvmTarget = "17"/' "$GRADLE"
          fi

      - name: Build APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-${{ env.PACKAGE_NAME }}-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/*.apk
