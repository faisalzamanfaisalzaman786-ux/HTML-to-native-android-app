name: System Pro V3 - APK & Widget Engine

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 📦 Extract & Decompress Payload
        run: |
          mkdir -p www
          # آپ کا اصل GZip لاجک ویسے ہی رہے گا تاکہ بلڈ ڈسٹرب نہ ہو
          echo '${{ github.event.client_payload.source_files.html_gz_base64 }}' | base64 -d | gunzip > www/index.html
          echo "APP_NAME=${{ github.event.client_payload.build_config.app_display_name }}" >> $GITHUB_ENV
          echo "PKG=${{ github.event.client_payload.build_config.package_name }}" >> $GITHUB_ENV

      - name: 🏗️ Initialize Capacitor
        run: |
          npm install @capacitor/cli @capacitor/android
          npx cap init "${{ env.APP_NAME }}" "${{ env.PKG }}" --web-dir www
          npx cap add android

      - name: 🛠️ Inject 1-Second Refresh Widget & Service
        run: |
          PKG_PATH=$(echo "${{ env.PKG }}" | sed 's/\./\//g')
          DIR="android/app/src/main/java/$PKG_PATH"
          RES="android/app/src/main/res"
          
          mkdir -p "$DIR" "$RES/layout" "$RES/xml" "$RES/drawable"

          # 1. Widget Design (UI)
          cat > "$RES/layout/system_pro_widget.xml" << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:background="#0a1e32"
              android:padding="10dp">
              <TextView android:id="@+id/widget_title"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="System Pro LIVE"
                  android:textColor="#00f3ff"
                  android:textStyle="bold"
                  android:textSize="12sp"/>
              <TextView android:id="@+id/widget_timer"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="Initializing..."
                  android:textColor="#ffffff"
                  android:textSize="18sp"
                  android:gravity="center"
                  android:layout_marginTop="5dp"/>
              <ImageView android:id="@+id/widget_img"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:scaleType="fitCenter"
                  android:layout_marginTop="5dp"/>
          </LinearLayout>
          EOF

          # 2. Widget Config
          cat > "$RES/xml/widget_info.xml" << 'EOF'
          <appwidget-provider xmlns:android="http://schemas.android.com/apk/res/android"
              android:minWidth="110dp"
              android:minHeight="110dp"
              android:updatePeriodMillis="0"
              android:initialLayout="@layout/system_pro_widget">
          </appwidget-provider>
          EOF

          # 3. Widget Background Service (Every Second Logic)
          cat > "$DIR/WidgetUpdateService.java" << EOF
          package ${{ env.PKG }};
          import android.app.*;
          import android.appwidget.*;
          import android.content.*;
          import android.os.*;
          import android.widget.RemoteViews;
          import java.text.SimpleDateFormat;
          import java.util.Date;
          import java.util.Locale;

          public class WidgetUpdateService extends Service {
              private Handler handler = new Handler(Looper.getMainLooper());
              private Runnable runnable;

              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  runnable = new Runnable() {
                      @Override
                      public void run() {
                          updateWidget();
                          handler.postDelayed(this, 1000); // 1 سیکنڈ کا وقفہ
                      }
                  };
                  handler.post(runnable);
                  return START_STICKY;
              }

              private void updateWidget() {
                  Context context = this;
                  AppWidgetManager appWidgetManager = AppWidgetManager.getInstance(context);
                  RemoteViews views = new RemoteViews(context.getPackageName(), R.layout.system_pro_widget);
                  
                  String currentTime = new SimpleDateFormat("HH:mm:ss", Locale.getDefault()).format(new Date());
                  views.setTextViewText(R.id.widget_timer, currentTime);
                  
                  ComponentName thisWidget = new ComponentName(context, AppWidgetProvider.class);
                  appWidgetManager.updateAppWidget(thisWidget, views);
              }

              @Override
              public IBinder onBind(Intent intent) { return null; }
          }
          EOF

          # 4. AppWidgetProvider
          cat > "$DIR/AppWidget.java" << EOF
          package ${{ env.PKG }};
          import android.appwidget.*;
          import android.content.*;

          public class AppWidget extends AppWidgetProvider {
              @Override
              public void onEnabled(Context context) {
                  super.onEnabled(context);
                  Intent intent = new Intent(context, WidgetUpdateService.class);
                  context.startService(intent);
              }
          }
          EOF

      - name: 🔧 Permissions & Manifest Fix
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # ایڈوانس سروس اور ویجٹ کی اجازتیں شامل کرنا
          sed -i '/<application/i \    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />' $MANIFEST
          sed -i '/<\/application>/i \
          <service android:name=".WidgetUpdateService" android:exported="false" /> \
          <receiver android:name=".AppWidget" android:exported="true"> \
              <intent-filter><action android:name="android.appwidget.action.APPWIDGET_UPDATE" /></intent-filter> \
              <meta-data android:name="android.appwidget.provider" android:resource="@xml/widget_info" /> \
          </receiver>' $MANIFEST

      - name: 🔧 Fix Dependencies (Kotlin Fix Included)
        run: |
          cd android
          echo "subprojects { configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.22' } } }" >> build.gradle

      - name: 🔄 Sync & Assemble
        run: |
          npx cap sync android
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: 📤 Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-V3-Full-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
