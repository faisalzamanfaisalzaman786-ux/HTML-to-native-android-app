# .github/workflows/build-android.yml
name: Build Android APK

on:
  # یہ آپشن آپ کو UI سے Manual Run کرنے کی اجازت دیتا ہے
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Android Package Name (e.g., com.example.app)'
        required: true
        default: 'com.myapp.webview'
        type: string
      app_name:
        description: 'App Display Name'
        required: true
        default: 'System Pro App'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # 1. Node.js اور Java انسٹال کریں
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # 2. آپ کی ویب فائلیں www فولڈر میں رکھیں
      - name: Prepare Web Assets
        run: |
          mkdir -p www
          cp index.html www/ 2>/dev/null || echo "<h1>My App</h1>" > www/index.html
          cp icon.png www/ 2>/dev/null || true

      # 3. سب سے اہم قدم: ٹیسٹ شدہ Accessories کا استعمال
      # یہ Accessory آپ کے لیے Capacitor کو انسٹال اور کنفیگر کر دے گا۔
      - uses: bytevictor/action-capacitor-android@v1
        with:
          app-name: ${{ inputs.app_name }}
          package-name: ${{ inputs.package_name }}
          keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          keystore-password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keystore-alias: ${{ secrets.ANDROID_KEY_ALIAS }}

      # 4. بلڈ کی گئی APK کو اپ لوڈ کریں
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
