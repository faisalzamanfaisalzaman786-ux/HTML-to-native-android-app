name: System Pro APK Build

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.client_payload.source_files.html_gz_base64 != ''

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 📦 Extract HTML and Icon from GZip Payload
        run: |
          mkdir -p www
          echo '${{ github.event.client_payload.source_files.html_gz_base64 }}' | base64 -d | gunzip > www/index.html
          
          ICON_EXISTS='${{ github.event.client_payload.assets.app_icon_base64 }}'
          if [ -n "$ICON_EXISTS" ]; then
            echo "$ICON_EXISTS" | base64 -d > icon.png
            cp icon.png www/icon.png
          fi
          
          echo "PACKAGE_NAME=${{ github.event.client_payload.build_config.package_name }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.build_config.app_display_name }}" >> $GITHUB_ENV

      - name: 📦 Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/cli @capacitor/android

      - name: 🗑️ Clean Android Project
        run: rm -rf android

      - name: 🏗️ Initialize Capacitor Android
        run: |
          npx cap init "${{ env.APP_NAME }}" "${{ env.PACKAGE_NAME }}" --web-dir www
          npx cap add android

      - name: 🖼️ Inject App Icon
        run: |
          if [ -f "icon.png" ]; then
            RES_PATH="android/app/src/main/res"
            DENSITIES=("mipmap-mdpi" "mipmap-hdpi" "mipmap-xhdpi" "mipmap-xxhdpi" "mipmap-xxxhdpi")
            for dir in "${DENSITIES[@]}"; do
              mkdir -p "$RES_PATH/$dir"
              cp icon.png "$RES_PATH/$dir/ic_launcher.png"
              cp icon.png "$RES_PATH/$dir/ic_launcher_round.png"
              cp icon.png "$RES_PATH/$dir/ic_launcher_foreground.png"
            done
          fi

      - name: 🔧 Fix Kotlin and Dependency Conflicts
        run: |
          cd android
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.22"/' build.gradle
          cat >> build.gradle << 'GRADLE_EOF'
          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
                      exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
                      exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
                  }
              }
          }
          GRADLE_EOF

      - name: 🔧 Configure SDK and Namespace
        run: |
          cd android
          sed -i '/android {/a\    compileSdk 34' app/build.gradle
          sed -i '/defaultConfig {/a\        minSdk 21\n        targetSdk 34' app/build.gradle
          sed -i "s/namespace .*/namespace \"${{ env.PACKAGE_NAME }}\"/" app/build.gradle

      - name: 🔧 Global Java 21 Fix
        run: |
          cd android
          cat >> build.gradle << 'EOF'
          allprojects {
              tasks.withType(JavaCompile) {
                  sourceCompatibility = JavaVersion.VERSION_21
                  targetCompatibility = JavaVersion.VERSION_21
              }
          }
          EOF

      - name: 🔐 Set Android Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/uses-permission/d' $MANIFEST
          PERMS=(INTERNET CAMERA FLASHLIGHT ACCESS_FINE_LOCATION ACCESS_COARSE_LOCATION READ_EXTERNAL_STORAGE WRITE_EXTERNAL_STORAGE RECORD_AUDIO)
          for perm in "${PERMS[@]}"; do
            sed -i "/<manifest/a\    <uses-permission android:name=\"android.permission.$perm\" />" $MANIFEST
          done

      # ========== شروع: ویجٹ شامل کرنے کا نیا مرحلہ ==========
      - name: 🧩 Add App Widget (Launcher)
        run: |
          cd android

          # ویجٹ کا XML layout (صرف ایک کلک کرنے والا بٹن کی طرح)
          mkdir -p app/src/main/res/layout
          cat > app/src/main/res/layout/widget_layout.xml << 'WIDGET_LAYOUT'
          <?xml version="1.0" encoding="utf-8"?>
          <FrameLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@android:color/white"
              android:padding="16dp">
              
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  android:orientation="vertical"
                  android:gravity="center">
                  
                  <ImageView
                      android:layout_width="48dp"
                      android:layout_height="48dp"
                      android:src="@drawable/ic_launcher_foreground"
                      android:contentDescription="App Icon" />
                  
                  <TextView
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="${{ env.APP_NAME }}"
                      android:textSize="14sp"
                      android:layout_marginTop="8dp"
                      android:textColor="@android:color/black" />
              </LinearLayout>
          </FrameLayout>
          WIDGET_LAYOUT

          # ویجٹ کی معلومات (سائز وغیرہ)
          mkdir -p app/src/main/res/xml
          cat > app/src/main/res/xml/widget_info.xml << 'WIDGET_INFO'
          <?xml version="1.0" encoding="utf-8"?>
          <appwidget-provider xmlns:android="http://schemas.android.com/apk/res/android"
              android:minWidth="180dp"
              android:minHeight="110dp"
              android:updatePeriodMillis="0"
              android:initialLayout="@layout/widget_layout"
              android:resizeMode="horizontal|vertical"
              android:widgetCategory="home_screen" />
          WIDGET_INFO

          # ویجٹ کا Kotlin کلاس (کلک کرنے پر ایپ کھولے)
          PACKAGE_NAME_LITERAL="${{ env.PACKAGE_NAME }}"
          JAVA_PACKAGE_PATH=$(echo $PACKAGE_NAME_LITERAL | tr '.' '/')
          mkdir -p "app/src/main/java/${JAVA_PACKAGE_PATH}/widget"
          
          cat > "app/src/main/java/${JAVA_PACKAGE_PATH}/widget/SimpleWidgetProvider.kt" << 'WIDGET_CODE'
          package ${{ env.PACKAGE_NAME }}.widget

          import android.app.PendingIntent
          import android.appwidget.AppWidgetManager
          import android.appwidget.AppWidgetProvider
          import android.content.Context
          import android.content.Intent
          import android.widget.RemoteViews
          import ${{ env.PACKAGE_NAME }}.MainActivity

          class SimpleWidgetProvider : AppWidgetProvider() {
              override fun onUpdate(context: Context, appWidgetManager: AppWidgetManager, appWidgetIds: IntArray) {
                  for (appWidgetId in appWidgetIds) {
                      val views = RemoteViews(context.packageName, com.getcapacitor.android.R.layout.widget_layout)
                      val intent = Intent(context, MainActivity::class.java)
                      val pendingIntent = PendingIntent.getActivity(context, 0, intent, PendingIntent.FLAG_IMMUTABLE or PendingIntent.FLAG_UPDATE_CURRENT)
                      views.setOnClickPendingIntent(android.R.id.background, pendingIntent)
                      appWidgetManager.updateAppWidget(appWidgetId, views)
                  }
              }
          }
          WIDGET_CODE

          # AndroidManifest.xml میں receiver شامل کریں
          MANIFEST="app/src/main/AndroidManifest.xml"
          # پہلے کوئی پہلے سے موجود receiver ہو تو ہٹائیں (اختیاری)
          sed -i '/SimpleWidgetProvider/d' $MANIFEST
          # نئی لائن داخل کریں
          sed -i '/<\/application>/i \        <receiver android:name="'"${JAVA_PACKAGE_PATH}"'.widget.SimpleWidgetProvider">\n            <intent-filter>\n                <action android:name="android.appwidget.action.APPWIDGET_UPDATE" />\n            </intent-filter>\n            <meta-data android:name="android.appwidget.provider" android:resource="@xml/widget_info" />\n        </receiver>' $MANIFEST

      - name: 🔄 Sync and Build Debug APK with Widget
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
      # ========== اختتام: ویجٹ کا اضافہ ==========

      - name: 📤 Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
