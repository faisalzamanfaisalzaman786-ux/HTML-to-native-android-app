name: Build APK

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.client_payload.source != ''

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Prepare
        run: |
          mkdir -p www
          SOURCE="${{ github.event.client_payload.source }}"
          ICON_B64="${{ github.event.client_payload.icon }}"
          
          echo "$SOURCE" | base64 -d > www/index.html
          
          if [ -n "$ICON_B64" ] && [ "$ICON_B64" != "null" ]; then
            echo "$ICON_B64" | base64 -d > icon.png || true
          fi
          
          echo "PACKAGE_NAME=${{ github.event.client_payload.package_name }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.app_name }}" >> $GITHUB_ENV

      - name: Decode Keystore
        run: |
          KEYSTORE_B64="${{ secrets.KEYSTORE_BASE64 }}"
          if [ -n "$KEYSTORE_B64" ] && [ "$KEYSTORE_B64" != "undefined" ]; then
            echo "$KEYSTORE_B64" | base64 -d > keystore.jks
            echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/keystore.jks" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          else
            keytool -genkey -v -keystore keystore.jks -alias release -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Unknown" -storepass android -keypass android
            echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/keystore.jks" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=android" >> $GITHUB_ENV
            echo "KEY_ALIAS=release" >> $GITHUB_ENV
            echo "KEY_PASSWORD=android" >> $GITHUB_ENV
          fi

      - name: Capacitor
        run: |
          npm init -y
          npm install @capacitor/cli@5.7.0 @capacitor/android@5.7.0
          npx cap init "${{ env.APP_NAME }}" "${{ env.PACKAGE_NAME }}" --web-dir www
          npx cap add android

      - name: Setup Signing in build.gradle
        run: |
          cd android
          # Insert signingConfigs INSIDE the android block
          sed -i '/android {/a\    signingConfigs {\n        release {\n            storeFile file(System.getenv("KEYSTORE_PATH") ?: "keystore.jks")\n            storePassword System.getenv("KEYSTORE_PASSWORD")\n            keyAlias System.getenv("KEY_ALIAS")\n            keyPassword System.getenv("KEY_PASSWORD")\n        }\n    }\n' app/build.gradle
          
          # Update buildTypes to use signingConfig
          sed -i '/buildTypes {/a\        release {\n            signingConfig signingConfigs.release\n            minifyEnabled false\n        }' app/build.gradle

      - name: Use Custom AndroidManifest
        run: |
          if [ -f "android_manifest/AndroidManifest.xml" ]; then
            cp android_manifest/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          fi

      - name: Generate App Icons
        run: |
          RES_PATH="android/app/src/main/res"
          
          if [ -f "icon.png" ]; then
            echo "Custom icon detected"
            for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              mkdir -p "$RES_PATH/mipmap-$density"
              cp icon.png "$RES_PATH/mipmap-$density/ic_launcher.png"
              cp icon.png "$RES_PATH/mipmap-$density/ic_launcher_round.png"
              cp icon.png "$RES_PATH/mipmap-$density/ic_launcher_foreground.png"
            done
            echo "Custom icons applied"
          else
            echo "No custom icon, using fallback"
          fi

      - name: Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
