name: System Pro V3.13 - Final Structure Fix

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Extract Payload
        run: |
          mkdir -p www
          echo '${{ github.event.client_payload.source_files.html_gz_base64 }}' | base64 -d | gunzip > www/index.html
          echo "APP_NAME=${{ github.event.client_payload.build_config.app_display_name }}" >> $GITHUB_ENV
          echo "PKG=${{ github.event.client_payload.build_config.package_name }}" >> $GITHUB_ENV

      - name: Initialize Capacitor 5
        run: |
          npm install @capacitor/cli@5 @capacitor/android@5
          npx cap init "${{ env.APP_NAME }}" "${{ env.PKG }}" --web-dir www
          npx cap add android

      - name: Build Java Components
        run: |
          PKG_PATH=$(echo "${{ env.PKG }}" | sed 's/\./\//g')
          DIR="android/app/src/main/java/$PKG_PATH"
          RES="android/app/src/main/res"
          mkdir -p "$DIR" "$RES/layout" "$RES/xml"

          # 1. Bridge for HTML Sync
          cat > "$DIR/WidgetBridge.java" << EOF
          package ${{ env.PKG }};
          import android.content.*;
          import android.appwidget.AppWidgetManager;
          import com.getcapacitor.Plugin;
          import com.getcapacitor.PluginCall;
          import com.getcapacitor.PluginMethod;
          import com.getcapacitor.annotation.CapacitorPlugin;

          @CapacitorPlugin(name = "WidgetBridge")
          public class WidgetBridge extends Plugin {
              @PluginMethod
              public void updateWidgetData(PluginCall call) {
                  String data = call.getString("namazData");
                  SharedPreferences pref = getContext().getSharedPreferences("WIDGET_PREFS", Context.MODE_PRIVATE);
                  pref.edit().putString("txt", data).apply();
                  Intent intent = new Intent(getContext(), AppWidget.class);
                  intent.setAction(AppWidgetManager.ACTION_APPWIDGET_UPDATE);
                  getContext().sendBroadcast(intent);
                  call.resolve();
              }
          }
          EOF

          # 2. Main Activity with Plugin Registration
          cat > "$DIR/MainActivity.java" << EOF
          package ${{ env.PKG }};
          import android.os.Bundle;
          import com.getcapacitor.BridgeActivity;
          public class MainActivity extends BridgeActivity {
              @Override public void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  registerPlugin(WidgetBridge.class);
              }
          }
          EOF

          # 3. Widget UI (Neon Theme)
          cat > "$RES/layout/system_pro_widget.xml" << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="#000000" android:padding="8dp">
              <TextView android:id="@+id/w_time" android:layout_width="match_parent" android:layout_height="wrap_content" 
                  android:textColor="#FF0000" android:textSize="20sp" android:gravity="center" android:textStyle="bold"/>
              <TextView android:id="@+id/w_data" android:layout_width="match_parent" android:layout_height="wrap_content" 
                  android:textColor="#00FFFF" android:textSize="12sp" android:gravity="center" android:layout_marginTop="4dp"/>
          </LinearLayout>
          EOF

          cat > "$RES/xml/widget_info.xml" << 'EOF'
          <appwidget-provider xmlns:android="http://schemas.android.com/apk/res/android"
              android:minWidth="110dp" android:minHeight="70dp" android:updatePeriodMillis="0"
              android:initialLayout="@layout/system_pro_widget" android:resizeMode="horizontal|vertical"></appwidget-provider>
          EOF

          # 4. Widget Logic
          cat > "$DIR/AppWidget.java" << EOF
          package ${{ env.PKG }};
          import android.appwidget.*; import android.content.*; import android.widget.RemoteViews;
          import java.text.SimpleDateFormat; import java.util.Date; import java.util.Locale;
          public class AppWidget extends AppWidgetProvider {
              @Override public void onUpdate(Context c, AppWidgetManager m, int[] ids) {
                  for (int id : ids) {
                      RemoteViews v = new RemoteViews(c.getPackageName(), R.layout.system_pro_widget);
                      v.setTextViewText(R.id.w_time, new SimpleDateFormat("HH:mm:ss", Locale.getDefault()).format(new Date()));
                      SharedPreferences p = c.getSharedPreferences("WIDGET_PREFS", Context.MODE_PRIVATE);
                      v.setTextViewText(R.id.w_data, p.getString("txt", "Waiting..."));
                      m.updateAppWidget(id, v);
                  }
              }
              @Override public void onReceive(Context c, Intent i) {
                  super.onReceive(c, i);
                  AppWidgetManager m = AppWidgetManager.getInstance(c);
                  onUpdate(c, m, m.getAppWidgetIds(new ComponentName(c, AppWidget.class)));
              }
          }
          EOF

      - name: Manifest & Gradle Config
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<\/activity>/a \
          <receiver android:name=".AppWidget" android:exported="true"> \
              <intent-filter><action android:name="android.appwidget.action.APPWIDGET_UPDATE" /></intent-filter> \
              <meta-data android:name="android.appwidget.provider" android:resource="@xml/widget_info" /> \
          </receiver>' $MANIFEST
          
          cd android
          sed -i 's/gradle-.*-all.zip/gradle-8.5-all.zip/' gradle/wrapper/gradle-wrapper.properties
          sed -i 's/com.android.tools.build:gradle:.*[0-9]/com.android.tools.build:gradle:8.2.0/' build.gradle
          echo "subprojects { configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22' } } }" >> build.gradle

      - name: Build APK
        run: |
          npx cap sync android
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-V3.13-Final
          path: android/app/build/outputs/apk/debug/app-debug.apk
