name: System Pro APK Build

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.client_payload.source != ''

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20.18.1
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'

      - name: ☕ Setup Java 21.0.5
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21.0.5'

      - name: 📦 Extract Payload (UI Sync)
        run: |
          mkdir -p www
          # ایپ کے بھیجے گئے پے لوڈ سے کوڈ نکالنا
          echo '${{ github.event.client_payload.source }}' | base64 -d | gunzip > www/index.html
          
          ICON_B64='${{ github.event.client_payload.icon }}'
          if [ -n "$ICON_B64" ] && [ "$ICON_B64" != "undefined" ]; then
            echo "$ICON_B64" | base64 -d > icon.png
          fi
          
          # ایپ نیم اور پیکیج نیم جو آپ نے سیٹنگز میں رکھا
          echo "PACKAGE_NAME=${{ github.event.client_payload.package_name }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.app_name }}" >> $GITHUB_ENV

      - name: 📦 Install Capacitor (Locked Versions)
        run: |
          npm init -y
          npm install @capacitor/cli@6.2.0 @capacitor/android@6.2.0

      - name: 🏗️ Initialize Android Project
        run: |
          npx cap init "${{ env.APP_NAME }}" "${{ env.PACKAGE_NAME }}" --web-dir www
          npx cap add android

      - name: 🔧 Lock Kotlin and Dependency Versions (Old Logic)
        run: |
          cd android
          # وہی پرانی کوٹلن ورژن لاکنگ جو پہلے سیٹ تھی
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.22"/' build.gradle
          cat >> build.gradle << 'GRADLE_EOF'
          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
                  }
              }
          }
          GRADLE_EOF

      - name: 🔧 SDK and Namespace (Android 14)
        run: |
          cd android
          # SDK 34 پر فکس لاکنگ
          sed -i '/android {/a\    compileSdk 34' app/build.gradle
          sed -i '/defaultConfig {/a\        minSdk 31\n        targetSdk 34' app/build.gradle
          sed -i "s/namespace .*/namespace \"${{ env.PACKAGE_NAME }}\"/" app/build.gradle

      - name: 🔄 Sync and Build APK
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 🚀 Release for UI Auto-Download
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          tag_name: latest
          name: "System Pro - ${{ env.APP_NAME }}"
          files: android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
