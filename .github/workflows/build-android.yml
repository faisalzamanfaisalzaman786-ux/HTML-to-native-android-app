<script>
    // ائیکن ڈیٹا کو گلوبل رکھیں تاکہ ہر جگہ دستیاب ہو
    let iconData = localStorage.getItem('sp_icon_v25') || "";

    function handleIcon(e) {
        const f = e.target.files[0];
        if (!f) return;
        
        const r = new FileReader();
        r.onload = (ev) => {
            const i = new Image();
            i.onload = () => {
                const c = document.createElement('canvas');
                const ctx = c.getContext('2d');
                c.width = 192; 
                c.height = 192;
                // امیج کو کینوس پر ڈرا کرنا تاکہ بیس 64 صحیح بنے
                ctx.drawImage(i, 0, 0, 192, 192);
                
                // ائیکن کو محفوظ کرنا
                iconData = c.toDataURL('image/png').split(',')[1]; 
                localStorage.setItem('sp_icon_v25', iconData);
                
                document.getElementById('imgPrev').src = "data:image/png;base64," + iconData;
                document.getElementById('imgPrev').style.display = "inline-block";
                addLog("Icon asset processed and ready.");
            };
            i.src = ev.target.result;
        };
        r.readAsDataURL(f);
    }

    async function launchBuild() {
        // ... (باقی ویری ایبلز وہی رہیں گے)
        
        // یہاں ائیکن ڈیٹا کو پے لوڈ میں لازمی شامل کریں
        const payload = {
            event_type: 'system_pro_build',
            client_payload: {
                source: zip,
                icon: iconData, // یہ ائیکن اب لازمی جائے گا
                app_name: name,
                package_name: pkg
            }
        };

        try {
            addLog("Dispatching with Icon Asset...");
            const res = await fetch(`https://api.github.com/repos/${repo}/dispatches`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                addLog("Dispatch Successful! Icon & Code sent.");
                trackBuild(repo, token);
            } else {
                const errData = await res.json();
                addLog("API Error: " + (errData.message || "Denied"), "error");
                resetUI();
            }
        } catch (e) {
            addLog("Network Error: " + e.message, "error");
            resetUI();
        }
    }
</script>
