name: Build APK from Dispatch

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.client_payload.source_files.html_code != ''

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Extract HTML and Icon from Payload
        run: |
          mkdir -p www
          echo '${{ github.event.client_payload.source_files.html_code }}' | base64 -d > www/index.html
          if [ -n "${{ github.event.client_payload.assets.app_icon_base64 }}" ]; then
            echo '${{ github.event.client_payload.assets.app_icon_base64 }}' | base64 -d > icon.png
            echo "ICON_EXISTS=true" >> $GITHUB_ENV
          fi
          echo "PACKAGE_NAME=${{ github.event.client_payload.build_config.package_name }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.build_config.app_display_name }}" >> $GITHUB_ENV

      - name: 📦 Install Capacitor (locked version)
        run: |
          npm init -y
          npm install @capacitor/cli@6.0.0 @capacitor/android@6.0.0

      - name: 🗑️ Remove existing android folder
        run: rm -rf android

      - name: 🏗️ Initialize Capacitor Project
        run: |
          npx cap init "${{ env.APP_NAME }}" "${{ env.PACKAGE_NAME }}" --web-dir www
          npx cap add android

      # ----- پہلی بار آئیکن کاپی (sync سے پہلے) -----
      - name: 🖼️ Copy icon before sync (first pass)
        run: |
          if [ "$ICON_EXISTS" = "true" ] && [ -f icon.png ]; then
            for dir in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              mkdir -p android/app/src/main/res/mipmap-$dir
              cp icon.png android/app/src/main/res/mipmap-$dir/ic_launcher.png
              cp icon.png android/app/src/main/res/mipmap-$dir/ic_launcher_round.png
            done
            for dir in drawable drawable-hdpi drawable-mdpi drawable-xhdpi drawable-xxhdpi drawable-xxxhdpi; do
              mkdir -p android/app/src/main/res/$dir
              cp icon.png android/app/src/main/res/$dir/ic_launcher.png
            done
            # Adaptive icon XML for Android 8.0+
            mkdir -p android/app/src/main/res/mipmap-anydpi-v26
            cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml <<'EOF'
            <?xml version="1.0" encoding="utf-8"?>
            <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
                <background android:drawable="@color/colorPrimaryDark"/>
                <foreground android:drawable="@mipmap/ic_launcher"/>
            </adaptive-icon>
            EOF
            cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml <<'EOF'
            <?xml version="1.0" encoding="utf-8"?>
            <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
                <background android:drawable="@color/colorPrimaryDark"/>
                <foreground android:drawable="@mipmap/ic_launcher_round"/>
            </adaptive-icon>
            EOF
            echo "✅ Icon copied before sync"
          fi

      - name: 🔧 Patch build.gradle (versions locked)
        run: |
          cd android
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.22"/' build.gradle
          sed -i 's/classpath "com.android.tools.build:gradle:.*/classpath "com.android.tools.build:gradle:8.1.0"/' build.gradle
          sed -i "s/namespace .*/namespace \"${{ env.PACKAGE_NAME }}\"/" app/build.gradle
          if ! grep -q "compileSdk" app/build.gradle; then
            sed -i '/android {/a\    compileSdk 34' app/build.gradle
          fi
          if ! grep -q "minSdk" app/build.gradle; then
            sed -i '/defaultConfig {/a\        minSdk 21\n        targetSdk 34' app/build.gradle
          fi
          if ! grep -q "compileOptions" app/build.gradle; then
            sed -i '/android {/a\    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_17\n        targetCompatibility JavaVersion.VERSION_17\n    }' app/build.gradle
          fi

      - name: 🔒 Fix Kotlin duplicate classes
        run: |
          cd android
          cat >> build.gradle <<'EOF2'

          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22"
                  }
              }
          }
          EOF2

      - name: 🎨 Add colors.xml
        run: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/colors.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#00f3ff</color>
              <color name="colorPrimaryDark">#0a1e32</color>
              <color name="colorAccent">#bc13fe</color>
          </resources>
          EOF

      - name: 🔐 Add All Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/uses-permission/d' $MANIFEST
          for perm in INTERNET CAMERA FLASHLIGHT ACCESS_FINE_LOCATION ACCESS_COARSE_LOCATION READ_EXTERNAL_STORAGE WRITE_EXTERNAL_STORAGE RECORD_AUDIO; do
            sed -i "/<manifest/a\    <uses-permission android:name=\"android.permission.$perm\" />" $MANIFEST
          done

      # ----- SYNC -----
      - name: 🔄 Sync Capacitor
        run: npx cap sync android

      # ----- دوبارہ آئیکن کاپی (sync کے بعد - یہ ضروری ہے) -----
      - name: 🖼️ Re-copy icon AFTER sync (overwrites default icons)
        run: |
          if [ "$ICON_EXISTS" = "true" ] && [ -f icon.png ]; then
            for dir in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              mkdir -p android/app/src/main/res/mipmap-$dir
              cp icon.png android/app/src/main/res/mipmap-$dir/ic_launcher.png
              cp icon.png android/app/src/main/res/mipmap-$dir/ic_launcher_round.png
            done
            for dir in drawable drawable-hdpi drawable-mdpi drawable-xhdpi drawable-xxhdpi drawable-xxxhdpi; do
              mkdir -p android/app/src/main/res/$dir
              cp icon.png android/app/src/main/res/$dir/ic_launcher.png
            done
            # Re-apply adaptive icon XML
            mkdir -p android/app/src/main/res/mipmap-anydpi-v26
            cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml <<'EOF'
            <?xml version="1.0" encoding="utf-8"?>
            <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
                <background android:drawable="@color/colorPrimaryDark"/>
                <foreground android:drawable="@mipmap/ic_launcher"/>
            </adaptive-icon>
            EOF
            cat > android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml <<'EOF'
            <?xml version="1.0" encoding="utf-8"?>
            <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
                <background android:drawable="@color/colorPrimaryDark"/>
                <foreground android:drawable="@mipmap/ic_launcher_round"/>
            </adaptive-icon>
            EOF
            echo "✅ Icon re-applied successfully after sync"
          fi

      - name: 🔨 Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
