name: Build APK from Dispatch

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.client_payload.source_files.html_code != ''

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 📦 Extract HTML and Icon from Payload
        run: |
          mkdir -p www
          echo '${{ github.event.client_payload.source_files.html_code }}' | base64 -d > www/index.html
          if [ -n "${{ github.event.client_payload.assets.app_icon_base64 }}" ]; then
            echo '${{ github.event.client_payload.assets.app_icon_base64 }}' | base64 -d > icon.png
            cp icon.png www/icon.png
          fi
          echo "PACKAGE_NAME=${{ github.event.client_payload.build_config.package_name }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.build_config.app_display_name }}" >> $GITHUB_ENV

      - name: 📦 Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/cli @capacitor/android

      - name: 🏗️ Initialize Capacitor Project
        run: |
          npx cap init "${{ env.APP_NAME }}" "${{ env.PACKAGE_NAME }}" --web-dir www
          npx cap add android

      # 🔥 اوور رائٹ root build.gradle (تازہ AGP اور صحیح ریپوزٹریز)
      - name: 📝 Override project build.gradle
        run: |
          cat > android/build.gradle <<'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.7.2'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22"
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          tasks.register('clean', Delete) {
              delete rootProject.buildDir
          }
          EOF

      # 📝 اوور رائٹ app/build.gradle (صحیح SDK ورژن اور پرمیشنز)
      - name: 📝 Override app/build.gradle
        run: |
          cat > android/app/build.gradle <<'EOF'
          apply plugin: 'com.android.application'
          apply plugin: 'org.jetbrains.kotlin.android'

          android {
              namespace "${{ env.PACKAGE_NAME }}"
              compileSdk 34

              defaultConfig {
                  applicationId "${{ env.PACKAGE_NAME }}"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
                  testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              kotlinOptions {
                  jvmTarget = '17'
              }
          }

          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              implementation project(':capacitor-android')
          }
          EOF

      # 🎨 colors.xml شامل کریں
      - name: 🎨 Add colors.xml
        run: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/colors.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#00f3ff</color>
              <color name="colorPrimaryDark">#0a1e32</color>
              <color name="colorAccent">#bc13fe</color>
          </resources>
          EOF

      # ✅ تمام پرمیشنز
      - name: 🔐 Add All Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/uses-permission/d' $MANIFEST
          for perm in INTERNET CAMERA FLASHLIGHT ACCESS_FINE_LOCATION ACCESS_COARSE_LOCATION READ_EXTERNAL_STORAGE WRITE_EXTERNAL_STORAGE RECORD_AUDIO; do
            sed -i "/<manifest/a\    <uses-permission android:name=\"android.permission.$perm\" />" $MANIFEST
          done

      - name: 🔄 Sync Capacitor & Build APK
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
