# System Pro V1400 - Widget Configuration
widget:
  name: "Namaz Clock Widget"
  update_interval: 15 # Minutes
  data_source: "local_host"
  bridge_enabled: true
  permissions:
    - android.permission.INTERNET
    - android.permission.ACCESS_NETWORK_STATE
    - android.permission.RECEIVE_BOOT_COMPLETED

# Local Connection Settings
connection:
  host: "127.0.0.1"
  port: 8080
  sync_method: "broadcast_receiver"
  cache_policy: "force_local_first"

# Style Vault Integration
theme:
  mode: "dark"
  style: "glassmorphism"
  accent_color: "#FF4136" # Neon Red
