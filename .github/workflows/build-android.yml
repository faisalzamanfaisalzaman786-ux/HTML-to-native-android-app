name: Build APK from Dispatch

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    # اب ہم نئے کی (Key) چیک کر رہے ہیں
    if: github.event.client_payload.source_files.html_gz_base64 != ''

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 📦 Extract HTML (GZip) and Icon from Payload
        run: |
          mkdir -p www
          
          # GZip + Base64 کو ڈی کوڈ اور ڈی کمپریس کرنا
          echo '${{ github.event.client_payload.source_files.html_gz_base64 }}' | base64 -d | gunzip > www/index.html
          
          # آئیکن مینیجمنٹ (پہلے کی طرح)
          ICON_EXISTS='${{ github.event.client_payload.assets.app_icon_base64 }}'
          if [ -n "$ICON_EXISTS" ]; then
            echo "$ICON_EXISTS" | base64 -d > icon.png
            cp icon.png www/icon.png
          fi
          
          echo "PACKAGE_NAME=${{ github.event.client_payload.build_config.package_name }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.build_config.app_display_name }}" >> $GITHUB_ENV

      - name: 📦 Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/cli @capacitor/android

      - name: 🗑️ Remove existing android folder
        run: rm -rf android

      - name: 🏗️ Initialize Capacitor Project
        run: |
          npx cap init "${{ env.APP_NAME }}" "${{ env.PACKAGE_NAME }}" --web-dir www
          npx cap add android

      - name: 🖼️ Set App Icon
        run: |
          if [ -f "icon.png" ]; then
            RES_PATH="android/app/src/main/res"
            DENSITIES=("mipmap-mdpi" "mipmap-hdpi" "mipmap-xhdpi" "mipmap-xxhdpi" "mipmap-xxxhdpi")
            for dir in "${DENSITIES[@]}"; do
              mkdir -p "$RES_PATH/$dir"
              cp icon.png "$RES_PATH/$dir/ic_launcher.png"
              cp icon.png "$RES_PATH/$dir/ic_launcher_round.png"
              cp icon.png "$RES_PATH/$dir/ic_launcher_foreground.png"
            done
          fi

      - name: 🔧 Set Java 21 for all modules
        run: |
          cd android
          cat >> build.gradle << 'EOF'
          allprojects {
              tasks.withType(JavaCompile) {
                  sourceCompatibility = JavaVersion.VERSION_21
                  targetCompatibility = JavaVersion.VERSION_21
              }
          }
          EOF

      - name: 🔧 Patch app/build.gradle (SDK & Namespace)
        run: |
          cd android
          sed -i '/android {/a\    compileSdk 34' app/build.gradle
          sed -i '/defaultConfig {/a\        minSdk 21\n        targetSdk 34' app/build.gradle
          sed -i "s/namespace .*/namespace \"${{ env.PACKAGE_NAME }}\"/" app/build.gradle

      - name: 🔧 Fix Kotlin version conflicts
        run: |
          cd android
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.22"/' build.gradle
          cat >> build.gradle << 'GRADLE_EOF'
          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22"
                  }
              }
          }
          GRADLE_EOF

      - name: 🎨 Add colors.xml
        run: |
          mkdir -p android/app/src/main/res/values
          cat > android/app/src/main/res/values/colors.xml << 'COLORS_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#00f3ff</color>
              <color name="colorPrimaryDark">#0a1e32</color>
              <color name="colorAccent">#bc13fe</color>
          </resources>
          COLORS_EOF

      - name: 🔐 Add All Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/uses-permission/d' $MANIFEST
          for perm in INTERNET CAMERA FLASHLIGHT ACCESS_FINE_LOCATION ACCESS_COARSE_LOCATION READ_EXTERNAL_STORAGE WRITE_EXTERNAL_STORAGE RECORD_AUDIO; do
            sed -i "/<manifest/a\    <uses-permission android:name=\"android.permission.$perm\" />" $MANIFEST
          done

      - name: 🔄 Sync & Build APK
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
