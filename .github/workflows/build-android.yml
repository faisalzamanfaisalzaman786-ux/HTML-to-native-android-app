name: Build APK

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build
        run: |
          mkdir -p www
          echo "Test" > www/index.html
          npm init -y
          npm install @capacitor/cli @capacitor/android
          npx cap init "Test" "com.test.app" --web-dir www
          npx cap add android
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          ls -la app/build/outputs/apk/release/
