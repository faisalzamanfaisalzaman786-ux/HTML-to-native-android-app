name: Build APK

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.client_payload.source == 'main'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Read files from repo
        run: |
          echo "=== READING FILES ==="
          
          if [ -f "www/index.html" ]; then
            cp www/index.html index.html
            echo "✅ HTML loaded"
          else
            echo "❌ HTML not found"
            exit 1
          fi
          
          if [ -f "app_config.json" ]; then
            PACKAGE_NAME=$(jq -r '.package_name' app_config.json)
            APP_NAME=$(jq -r '.app_name' app_config.json)
            echo "PACKAGE_NAME=$PACKAGE_NAME" >> $GITHUB_ENV
            echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV
            echo "✅ Config: $PACKAGE_NAME / $APP_NAME"
          else
            echo "PACKAGE_NAME=com.web2app.demo" >> $GITHUB_ENV
            echo "APP_NAME=Web2App" >> $GITHUB_ENV
          fi
          
          if [ -f "app_icon.png" ]; then
            echo "Found app_icon.png, checking format..."
            if file app_icon.png | grep -q 'PNG'; then
              cp app_icon.png icon.png
              echo "✅ Icon is valid PNG"
            else
              base64 -d app_icon.png > icon.png 2>/dev/null
              if [ -f "icon.png" ] && file icon.png | grep -q 'PNG'; then
                echo "✅ Icon decoded from Base64"
              fi
            fi
            ls -la icon.png
          fi

      - name: Setup Keystore
        run: |
          KEYSTORE_B64="${{ secrets.KEYSTORE_BASE64 }}"
          if [ -n "$KEYSTORE_B64" ] && [ "$KEYSTORE_B64" != "undefined" ]; then
            echo "$KEYSTORE_B64" | base64 -d > keystore.jks
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          else
            keytool -genkey -v -keystore keystore.jks -alias release -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Unknown" -storepass android -keypass android
            echo "KEYSTORE_PASSWORD=android" >> $GITHUB_ENV
            echo "KEY_ALIAS=release" >> $GITHUB_ENV
            echo "KEY_PASSWORD=android" >> $GITHUB_ENV
          fi
          echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/keystore.jks" >> $GITHUB_ENV

      - name: Setup Capacitor
        run: |
          npm init -y
          npm install @capacitor/cli@5.7.0 @capacitor/android@5.7.0 @capacitor/core@5.7.0
          npm install @capacitor/camera@5.0.0 @capacitor/filesystem@5.0.0 @capacitor/geolocation@5.0.0
          npx cap init "$APP_NAME" "$PACKAGE_NAME" --web-dir www
          npx cap add android

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Copy Keystore
        run: cp keystore.jks android/app/

      - name: Add Signing Config
        run: |
          cd android
          sed -i '/android {/a\    signingConfigs {\n        release {\n            storeFile file("keystore.jks")\n            storePassword System.getenv("KEYSTORE_PASSWORD")\n            keyAlias System.getenv("KEY_ALIAS")\n            keyPassword System.getenv("KEY_PASSWORD")\n        }\n    }\n' app/build.gradle
          sed -i '/buildTypes {/a\        release {\n            signingConfig signingConfigs.release\n        }' app/build.gradle

      - name: Use Custom AndroidManifest
        run: |
          if [ -f "android_manifest/AndroidManifest.xml" ]; then
            cp android_manifest/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          fi

      - name: Create Theme Files
        run: |
          mkdir -p android/app/src/main/res/values
          
          rm -f android/app/src/main/res/values/styles.xml
          rm -f android/app/src/main/res/values/themes.xml
          rm -f android/app/src/main/res/values/ic_launcher_background.xml
          
          echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/res/values/colors.xml
          echo '<resources>' >> android/app/src/main/res/values/colors.xml
          echo '    <color name="colorPrimary">#6200EE</color>' >> android/app/src/main/res/values/colors.xml
          echo '    <color name="colorPrimaryDark">#3700B3</color>' >> android/app/src/main/res/values/colors.xml
          echo '    <color name="colorAccent">#03DAC5</color>' >> android/app/src/main/res/values/colors.xml
          echo '    <color name="ic_launcher_background">#FFFFFF</color>' >> android/app/src/main/res/values/colors.xml
          echo '</resources>' >> android/app/src/main/res/values/colors.xml
          
          echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/res/values/styles.xml
          echo '<resources>' >> android/app/src/main/res/values/styles.xml
          echo '    <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">' >> android/app/src/main/res/values/styles.xml
          echo '        <item name="colorPrimary">@color/colorPrimary</item>' >> android/app/src/main/res/values/styles.xml
          echo '        <item name="colorPrimaryDark">@color/colorPrimaryDark</item>' >> android/app/src/main/res/values/styles.xml
          echo '        <item name="colorAccent">@color/colorAccent</item>' >> android/app/src/main/res/values/styles.xml
          echo '    </style>' >> android/app/src/main/res/values/styles.xml
          echo '</resources>' >> android/app/src/main/res/values/styles.xml
          
          echo "✅ Theme files created"

      - name: Generate App Icons
        run: |
          echo "=== GENERATING ICONS ==="
          
          if [ -f "icon.png" ] && file icon.png | grep -q 'PNG'; then
            echo "Processing icon.png"
            RES="android/app/src/main/res"
            
            rm -rf $RES/mipmap-*
            
            mkdir -p $RES/mipmap-mdpi $RES/mipmap-hdpi $RES/mipmap-xhdpi $RES/mipmap-xxhdpi $RES/mipmap-xxxhdpi
            
            convert icon.png -resize 48x48 -gravity center -extent 48x48 $RES/mipmap-mdpi/ic_launcher.png
            convert icon.png -resize 48x48 -gravity center -extent 48x48 $RES/mipmap-mdpi/ic_launcher_round.png
            convert icon.png -resize 48x48 -gravity center -extent 48x48 $RES/mipmap-mdpi/ic_launcher_foreground.png
            
            convert icon.png -resize 72x72 -gravity center -extent 72x72 $RES/mipmap-hdpi/ic_launcher.png
            convert icon.png -resize 72x72 -gravity center -extent 72x72 $RES/mipmap-hdpi/ic_launcher_round.png
            convert icon.png -resize 72x72 -gravity center -extent 72x72 $RES/mipmap-hdpi/ic_launcher_foreground.png
            
            convert icon.png -resize 96x96 -gravity center -extent 96x96 $RES/mipmap-xhdpi/ic_launcher.png
            convert icon.png -resize 96x96 -gravity center -extent 96x96 $RES/mipmap-xhdpi/ic_launcher_round.png
            convert icon.png -resize 96x96 -gravity center -extent 96x96 $RES/mipmap-xhdpi/ic_launcher_foreground.png
            
            convert icon.png -resize 144x144 -gravity center -extent 144x144 $RES/mipmap-xxhdpi/ic_launcher.png
            convert icon.png -resize 144x144 -gravity center -extent 144x144 $RES/mipmap-xxhdpi/ic_launcher_round.png
            convert icon.png -resize 144x144 -gravity center -extent 144x144 $RES/mipmap-xxhdpi/ic_launcher_foreground.png
            
            convert icon.png -resize 192x192 -gravity center -extent 192x192 $RES/mipmap-xxxhdpi/ic_launcher.png
            convert icon.png -resize 192x192 -gravity center -extent 192x192 $RES/mipmap-xxxhdpi/ic_launcher_round.png
            convert icon.png -resize 192x192 -gravity center -extent 192x192 $RES/mipmap-xxxhdpi/ic_launcher_foreground.png
            
            mkdir -p $RES/mipmap-anydpi-v26
            echo '<?xml version="1.0" encoding="utf-8"?>' > $RES/mipmap-anydpi-v26/ic_launcher.xml
            echo '<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">' >> $RES/mipmap-anydpi-v26/ic_launcher.xml
            echo '    <background android:drawable="@color/ic_launcher_background"/>' >> $RES/mipmap-anydpi-v26/ic_launcher.xml
            echo '    <foreground android:drawable="@mipmap/ic_launcher_foreground"/>' >> $RES/mipmap-anydpi-v26/ic_launcher.xml
            echo '</adaptive-icon>' >> $RES/mipmap-anydpi-v26/ic_launcher.xml
            
            echo "✅ Custom icons generated"
          else
            echo "⚠️ No custom icon"
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build APK and AAB
        run: |
          cd android
          chmod +x gradlew
          
          # Try APK build with retry
          for i in 1 2 3; do
            echo "Attempt $i to build APK..."
            if ./gradlew assembleRelease --no-daemon; then
              echo "APK build successful!"
              break
            fi
            if [ $i -eq 3 ]; then
              echo "Failed to build APK after 3 attempts"
              exit 1
            fi
            echo "Retrying in 15 seconds..."
            sleep 15
          done
          
          # Try AAB build with retry
          for i in 1 2 3; do
            echo "Attempt $i to build AAB..."
            if ./gradlew bundleRelease --no-daemon; then
              echo "AAB build successful!"
              break
            fi
            if [ $i -eq 3 ]; then
              echo "Failed to build AAB after 3 attempts"
              exit 1
            fi
            echo "Retrying in 15 seconds..."
            sleep 15
          done

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
