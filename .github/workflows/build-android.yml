name: Build APK

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.client_payload.source != ''

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml || true

      - name: Prepare HTML and Icon
        run: |
          mkdir -p www
          SOURCE="${{ github.event.client_payload.source }}"
          ICON_B64="${{ github.event.client_payload.icon }}"
          
          echo "$SOURCE" | base64 -d > www/index.html
          
          if [ -n "$ICON_B64" ] && [ "$ICON_B64" != "null" ] && [ "$ICON_B64" != "" ]; then
            echo "$ICON_B64" | base64 -d > icon.png 2>/dev/null || true
            if [ -f "icon.png" ]; then
              echo "Custom icon received: $(wc -c < icon.png) bytes"
            fi
          fi
          
          echo "PACKAGE_NAME=${{ github.event.client_payload.package_name }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.app_name }}" >> $GITHUB_ENV

      - name: Decode Keystore
        run: |
          KEYSTORE_B64="${{ secrets.KEYSTORE_BASE64 }}"
          if [ -n "$KEYSTORE_B64" ] && [ "$KEYSTORE_B64" != "undefined" ]; then
            echo "$KEYSTORE_B64" | base64 -d > keystore.jks
            echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/keystore.jks" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
            echo "✅ Production keystore loaded"
          else
            keytool -genkey -v -keystore keystore.jks -alias release -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown" -storepass android -keypass android
            echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/keystore.jks" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=android" >> $GITHUB_ENV
            echo "KEY_ALIAS=release" >> $GITHUB_ENV
            echo "KEY_PASSWORD=android" >> $GITHUB_ENV
            echo "⚠️ Using debug keystore"
          fi

      - name: Setup Capacitor
        run: |
          npm init -y
          npm install @capacitor/cli@5.7.0 @capacitor/android@5.7.0
          npx cap init "${{ env.APP_NAME }}" "${{ env.PACKAGE_NAME }}" --web-dir www
          npx cap add android

      - name: Copy Keystore to Android
        run: |
          cp keystore.jks android/app/

      - name: Add Signing to build.gradle
        run: |
          cd android
          
          # Add signing config inside android block
          sed -i '/android {/a\    signingConfigs {\n        release {\n            storeFile file("keystore.jks")\n            storePassword System.getenv("KEYSTORE_PASSWORD")\n            keyAlias System.getenv("KEY_ALIAS")\n            keyPassword System.getenv("KEY_PASSWORD")\n        }\n    }\n' app/build.gradle
          
          # Update buildTypes to use signing config
          sed -i '/buildTypes {/a\        release {\n            signingConfig signingConfigs.release\n        }' app/build.gradle

      - name: Use Custom AndroidManifest
        run: |
          if [ -f "android_manifest/AndroidManifest.xml" ]; then
            cp android_manifest/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
            echo "Using custom manifest"
          fi

      - name: Create Colors and Themes
        run: |
          RES="android/app/src/main/res/values"
          mkdir -p $RES
          
          rm -f $RES/styles.xml 2>/dev/null || true
          
          cat > $RES/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#6200EE</color>
              <color name="colorPrimaryDark">#3700B3</color>
              <color name="colorAccent">#03DAC5</color>
              <color name="background">#FFFFFF</color>
              <color name="textColor">#000000</color>
          </resources>
          EOF
          
          cat > $RES/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
              </style>
          </resources>
          EOF
          
          echo "Colors and themes created"

      - name: Generate App Icons
        run: |
          if [ -f "icon.png" ] && file icon.png | grep -q 'PNG image'; then
            echo "🎨 Custom icon detected"
            RES="android/app/src/main/res"
            
            # Create all density folders
            for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              mkdir -p $RES/mipmap-$d
            done
            
            # mdpi (48x48)
            convert icon.png -resize 48x48 -background white -gravity center -extent 48x48 $RES/mipmap-mdpi/ic_launcher.png
            convert icon.png -resize 48x48 -background white -gravity center -extent 48x48 $RES/mipmap-mdpi/ic_launcher_round.png
            
            # hdpi (72x72)
            convert icon.png -resize 72x72 -background white -gravity center -extent 72x72 $RES/mipmap-hdpi/ic_launcher.png
            convert icon.png -resize 72x72 -background white -gravity center -extent 72x72 $RES/mipmap-hdpi/ic_launcher_round.png
            
            # xhdpi (96x96)
            convert icon.png -resize 96x96 -background white -gravity center -extent 96x96 $RES/mipmap-xhdpi/ic_launcher.png
            convert icon.png -resize 96x96 -background white -gravity center -extent 96x96 $RES/mipmap-xhdpi/ic_launcher_round.png
            
            # xxhdpi (144x144)
            convert icon.png -resize 144x144 -background white -gravity center -extent 144x144 $RES/mipmap-xxhdpi/ic_launcher.png
            convert icon.png -resize 144x144 -background white -gravity center -extent 144x144 $RES/mipmap-xxhdpi/ic_launcher_round.png
            
            # xxxhdpi (192x192)
            convert icon.png -resize 192x192 -background white -gravity center -extent 192x192 $RES/mipmap-xxxhdpi/ic_launcher.png
            convert icon.png -resize 192x192 -background white -gravity center -extent 192x192 $RES/mipmap-xxxhdpi/ic_launcher_round.png
            
            echo "✅ Custom icons generated successfully"
            ls -la $RES/mipmap-mdpi/ic_launcher.png
          else
            echo "⚠️ No custom icon found, using default"
          fi

      - name: Sync Capacitor
        run: |
          npx cap sync android

      - name: Build APK and AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          ./gradlew bundleRelease
          
          echo "=== Build Outputs ==="
          ls -la app/build/outputs/apk/release/
          ls -la app/build/outputs/bundle/release/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
