name: System Pro APK Build

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.client_payload.source_files.html_gz_base64 != ''

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20.18.1
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'

      - name: ☕ Setup Java 21.0.5
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21.0.5'

      - name: 📦 Extract HTML and Icon from GZip Payload
        run: |
          mkdir -p www
          echo '${{ github.event.client_payload.source_files.html_gz_base64 }}' | base64 -d | gunzip > www/index.html
          
          ICON_EXISTS='${{ github.event.client_payload.assets.app_icon_base64 }}'
          if [ -n "$ICON_EXISTS" ]; then
            echo "$ICON_EXISTS" | base64 -d > icon.png
            cp icon.png www/icon.png
          fi
          
          echo "PACKAGE_NAME=${{ github.event.client_payload.build_config.package_name }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.build_config.app_display_name }}" >> $GITHUB_ENV

      - name: 📦 Install Capacitor and Plugins (Locked Versions)
        run: |
          npm init -y
          npm install @capacitor/cli@6.2.0 @capacitor/android@6.2.0
          npm install @capacitor/preferences@6.0.2

      - name: 🗑️ Clean Android Project
        run: rm -rf android

      - name: 🏗️ Initialize Capacitor Android
        run: |
          npx cap init "${{ env.APP_NAME }}" "${{ env.PACKAGE_NAME }}" --web-dir www
          npx cap add android

      - name: 🖼️ Inject App Icon
        run: |
          if [ -f "icon.png" ]; then
            RES_PATH="android/app/src/main/res"
            DENSITIES=("mipmap-mdpi" "mipmap-hdpi" "mipmap-xhdpi" "mipmap-xxhdpi" "mipmap-xxxhdpi")
            for dir in "${DENSITIES[@]}"; do
              mkdir -p "$RES_PATH/$dir"
              cp icon.png "$RES_PATH/$dir/ic_launcher.png"
              cp icon.png "$RES_PATH/$dir/ic_launcher_round.png"
              cp icon.png "$RES_PATH/$dir/ic_launcher_foreground.png"
            done
          fi

      - name: 🔧 Lock Kotlin and Dependency Versions
        run: |
          cd android
          # Force exact Kotlin version
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.22"/' build.gradle
          cat >> build.gradle << 'GRADLE_EOF'
          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
                      exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
                      exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
                  }
              }
          }
          GRADLE_EOF

      - name: 🔧 Configure SDK and Namespace
        run: |
          cd android
          sed -i '/android {/a\    compileSdk 34' app/build.gradle
          sed -i '/defaultConfig {/a\        minSdk 21\n        targetSdk 34' app/build.gradle
          sed -i "s/namespace .*/namespace \"${{ env.PACKAGE_NAME }}\"/" app/build.gradle

      - name: 🔧 Set Java Compatibility to 21
        run: |
          cd android
          cat >> build.gradle << 'EOF'
          allprojects {
              tasks.withType(JavaCompile) {
                  sourceCompatibility = JavaVersion.VERSION_21
                  targetCompatibility = JavaVersion.VERSION_21
              }
          }
          EOF

      - name: 🔐 Set Android Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/uses-permission/d' $MANIFEST
          PERMS=(INTERNET CAMERA FLASHLIGHT ACCESS_FINE_LOCATION ACCESS_COARSE_LOCATION READ_EXTERNAL_STORAGE WRITE_EXTERNAL_STORAGE RECORD_AUDIO)
          for perm in "${PERMS[@]}"; do
            sed -i "/<manifest/a\    <uses-permission android:name=\"android.permission.$perm\" />" $MANIFEST
          done

      - name: 🔄 Sync and Build Debug APK
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
