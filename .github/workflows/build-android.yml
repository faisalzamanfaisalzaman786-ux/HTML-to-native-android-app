name: System Pro APK + AAB Build (Release)

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.client_payload.source != ''

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20.18.1
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.1'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick
          sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml || true

      - name: Extract and Decompress Payload
        run: |
          mkdir -p www
          
          SOURCE_B64="${{ github.event.client_payload.source }}"
          ICON_B64="${{ github.event.client_payload.icon }}"
          
          if [ -n "$SOURCE_B64" ]; then
            echo "$SOURCE_B64" | base64 -d > /tmp/source_raw
            
            if [ "$(xxd -p -l2 /tmp/source_raw 2>/dev/null)" = "1f8b" ]; then
              echo "📦 Gzipped content detected, decompressing..."
              gunzip -c /tmp/source_raw > www/index.html
            else
              echo "📄 Plain text detected, copying directly..."
              cp /tmp/source_raw www/index.html
            fi
            
            rm -f www/index.html.gz 2>/dev/null || true
            echo "✅ HTML prepared: $(wc -c < www/index.html) bytes"
          else
            echo "❌ ERROR: No source provided"
            exit 1
          fi
          
          # Handle icon
          if [ -n "$ICON_B64" ] && [ "$ICON_B64" != "null" ] && [ "$ICON_B64" != "" ]; then
            echo "$ICON_B64" | base64 -d > icon.png 2>/dev/null
            if [ -f "icon.png" ] && file icon.png | grep -q 'PNG image'; then
              echo "✅ Valid icon decoded"
            else
              rm -f icon.png
            fi
          fi
          
          echo "PACKAGE_NAME=${{ github.event.client_payload.package_name }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.app_name }}" >> $GITHUB_ENV

      - name: Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/cli@6.2.0 @capacitor/android@6.2.0
          # Optional: Install common plugins if needed
          # npm install @capacitor/camera @capacitor/filesystem @capacitor/geolocation

      - name: Initialize Android Project
        run: |
          npx cap init "${{ env.APP_NAME }}" "${{ env.PACKAGE_NAME }}" --web-dir www
          npx cap add android

      - name: Use Custom AndroidManifest (if exists) or Create Default
        run: |
          MANIFEST_SOURCE="android_manifest/AndroidManifest.xml"
          MANIFEST_TARGET="android/app/src/main/AndroidManifest.xml"
          
          # Check if user provided custom manifest
          if [ -f "$MANIFEST_SOURCE" ]; then
            echo "📄 Custom AndroidManifest.xml found! Using user-defined manifest."
            cp "$MANIFEST_SOURCE" "$MANIFEST_TARGET"
            echo "✅ Custom manifest copied from repository"
            
            # Validate manifest has package name placeholder or replace it
            sed -i "s/\${packageName}/${{ env.PACKAGE_NAME }}/g" "$MANIFEST_TARGET"
            sed -i "s/\${appName}/${{ env.APP_NAME }}/g" "$MANIFEST_TARGET"
          else
            echo "📄 No custom manifest found, creating default manifest..."
            
            cat > "$MANIFEST_TARGET" << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="${packageName}">
              
              <!-- Basic Permissions -->
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              
              <!-- Optional: Add more permissions here if needed -->
              
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="${appName}"
                  android:theme="@style/AppTheme"
                  android:supportsRtl="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
            sed -i "s/\${packageName}/${{ env.PACKAGE_NAME }}/g" "$MANIFEST_TARGET"
            sed -i "s/\${appName}/${{ env.APP_NAME }}/g" "$MANIFEST_TARGET"
            echo "✅ Default manifest created"
          fi
          
          echo "📋 Final manifest content:"
          cat "$MANIFEST_TARGET" | head -30

      - name: Generate App Icons
        run: |
          RES_PATH="android/app/src/main/res"
          
          if [ -f "icon.png" ] && file icon.png | grep -q 'PNG image'; then
            echo "🎨 Using custom icon..."
            for size in 48 72 96 144 192; do
              case $size in
                48) density="mipmap-mdpi" ;;
                72) density="mipmap-hdpi" ;;
                96) density="mipmap-xhdpi" ;;
                144) density="mipmap-xxhdpi" ;;
                192) density="mipmap-xxxhdpi" ;;
              esac
              mkdir -p "$RES_PATH/$density"
              convert icon.png -resize ${size}x${size} -background white -gravity center -extent ${size}x${size} "$RES_PATH/$density/ic_launcher.png" 2>/dev/null || cp icon.png "$RES_PATH/$density/ic_launcher.png"
              cp "$RES_PATH/$density/ic_launcher.png" "$RES_PATH/$density/ic_launcher_round.png" 2>/dev/null || true
              cp "$RES_PATH/$density/ic_launcher.png" "$RES_PATH/$density/ic_launcher_foreground.png" 2>/dev/null || true
            done
            echo "✅ Custom icons applied"
          else
            echo "🎨 Generating fallback icons..."
            for size in 48 72 96 144 192; do
              case $size in
                48) density="mipmap-mdpi" ;;
                72) density="mipmap-hdpi" ;;
                96) density="mipmap-xhdpi" ;;
                144) density="mipmap-xxhdpi" ;;
                192) density="mipmap-xxxhdpi" ;;
              esac
              mkdir -p "$RES_PATH/$density"
              convert -size ${size}x${size} xc:#6200EE -gravity center \
                -font Helvetica -pointsize $((size/3)) -fill white -annotate 0 "A" \
                "$RES_PATH/$density/ic_launcher.png" 2>/dev/null || true
              cp "$RES_PATH/$density/ic_launcher.png" "$RES_PATH/$density/ic_launcher_round.png" 2>/dev/null || true
              cp "$RES_PATH/$density/ic_launcher.png" "$RES_PATH/$density/ic_launcher_foreground.png" 2>/dev/null || true
            done
            echo "✅ Fallback icons generated"
          fi

      - name: Lock Kotlin and Dependencies
        run: |
          cd android
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.22"/' build.gradle
          cat >> build.gradle << 'GRADLE_EOF'
          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
                  }
              }
          }
          GRADLE_EOF

      - name: Configure SDK, Namespace and Signing
        run: |
          cd android
          
          sed -i '/android {/a\    compileSdk 34' app/build.gradle
          sed -i '/defaultConfig {/a\        minSdk 21\n        targetSdk 34' app/build.gradle
          sed -i "s/namespace .*/namespace \"${{ env.PACKAGE_NAME }}\"/" app/build.gradle
          
          sed -i '/buildTypes {/i\    signingConfigs {\n        release {\n            storeFile file(System.getenv("KEYSTORE_PATH") ?: "keystore.jks")\n            storePassword System.getenv("KEYSTORE_PASSWORD")\n            keyAlias System.getenv("KEY_ALIAS")\n            keyPassword System.getenv("KEY_PASSWORD")\n        }\n    }\n' app/build.gradle
          
          sed -i '/buildTypes {/,/}/ s/release {/release {\n            signingConfig signingConfigs.release/' app/build.gradle

      - name: Decode Keystore
        run: |
          KEYSTORE_B64="${{ secrets.KEYSTORE_BASE64 }}"
          if [ -n "$KEYSTORE_B64" ] && [ "$KEYSTORE_B64" != "undefined" ]; then
            echo "$KEYSTORE_B64" | base64 -d > keystore.jks
            echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/keystore.jks" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
            echo "✅ Using production keystore"
          else
            keytool -genkey -v -keystore keystore.jks -alias release -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown" -storepass android -keypass android
            echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/keystore.jks" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=android" >> $GITHUB_ENV
            echo "KEY_ALIAS=release" >> $GITHUB_ENV
            echo "KEY_PASSWORD=android" >> $GITHUB_ENV
            echo "⚠️ Using debug keystore"
          fi

      - name: Sync and Build Release APK + AAB
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace
          ./gradlew bundleRelease --stacktrace

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: warn

      - name: Upload Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: success()
        with:
          tag_name: latest
          name: "Build: ${{ env.APP_NAME }}"
          files: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
