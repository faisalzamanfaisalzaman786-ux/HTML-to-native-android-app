name: Build APK

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.client_payload.source != ''

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install ImageMagick
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Prepare HTML and Icon
        run: |
          mkdir -p www
          SOURCE="${{ github.event.client_payload.source }}"
          ICON_B64="${{ github.event.client_payload.icon }}"
          
          echo "$SOURCE" | base64 -d > www/index.html
          
          if [ -n "$ICON_B64" ] && [ "$ICON_B64" != "null" ]; then
            echo "$ICON_B64" | base64 -d > icon.png || true
          fi
          
          echo "PACKAGE_NAME=${{ github.event.client_payload.package_name }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.app_name }}" >> $GITHUB_ENV

      - name: Decode Keystore
        run: |
          KEYSTORE_B64="${{ secrets.KEYSTORE_BASE64 }}"
          if [ -n "$KEYSTORE_B64" ] && [ "$KEYSTORE_B64" != "undefined" ]; then
            echo "$KEYSTORE_B64" | base64 -d > keystore.jks
            echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/keystore.jks" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
          else
            keytool -genkey -v -keystore keystore.jks -alias release -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Unknown" -storepass android -keypass android
            echo "KEYSTORE_PATH=$GITHUB_WORKSPACE/keystore.jks" >> $GITHUB_ENV
            echo "KEYSTORE_PASSWORD=android" >> $GITHUB_ENV
            echo "KEY_ALIAS=release" >> $GITHUB_ENV
            echo "KEY_PASSWORD=android" >> $GITHUB_ENV
          fi

      - name: Capacitor
        run: |
          npm init -y
          npm install @capacitor/cli@5.7.0 @capacitor/android@5.7.0
          npx cap init "${{ env.APP_NAME }}" "${{ env.PACKAGE_NAME }}" --web-dir www
          npx cap add android

      - name: Copy Keystore to Android
        run: |
          cp keystore.jks android/app/

      - name: Create build.gradle with signing
        run: |
          cat > android/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }

          android {
              compileSdk 34
              namespace "${{ env.PACKAGE_NAME }}"
              
              defaultConfig {
                  applicationId "${{ env.PACKAGE_NAME }}"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              
              signingConfigs {
                  release {
                      storeFile file("keystore.jks")
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASSWORD")
                  }
              }
              
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.9.0'
          }
          EOF

      - name: Use Custom AndroidManifest
        run: |
          if [ -f "android_manifest/AndroidManifest.xml" ]; then
            cp android_manifest/AndroidManifest.xml android/app/src/main/AndroidManifest.xml
          fi

      - name: Create Colors and Themes
        run: |
          RES="android/app/src/main/res/values"
          mkdir -p $RES
          
          # Remove conflicting styles.xml
          rm -f $RES/styles.xml
          
          cat > $RES/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#6200EE</color>
              <color name="colorPrimaryDark">#3700B3</color>
              <color name="colorAccent">#03DAC5</color>
              <color name="background">#FFFFFF</color>
              <color name="textColor">#000000</color>
          </resources>
          EOF
          
          cat > $RES/themes.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.Light.DarkActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
              </style>
          </resources>
          EOF

      - name: Generate Icons
        run: |
          if [ -f "icon.png" ]; then
            RES="android/app/src/main/res"
            for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
              mkdir -p $RES/mipmap-$d
              cp icon.png $RES/mipmap-$d/ic_launcher.png
              cp icon.png $RES/mipmap-$d/ic_launcher_round.png
            done
          fi

      - name: Build
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          ./gradlew bundleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/*.apk

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
