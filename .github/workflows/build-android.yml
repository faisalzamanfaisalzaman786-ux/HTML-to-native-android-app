# System Pro V1400 - Build & Widget Engine
version: 1400.948
project_name: "Namaz Clock Lodhi"
package_name: "com.systempro.namaz.clock"

# Localhost Sync Settings
bridge_configuration:
  host: "127.0.0.1"
  port: 8080
  local_sync: true
  persistence: "enabled"
  
# Automated Build Actions
build_engine:
  gradle_version: 8.5 # Force lock for stability
  auto_resource_injection: true
  dynamic_package_generation: true

# Widget Provider
widget_provider:
  update_interval: 15
  remote_views: "enabled"
  error_handling: "auto_restart"
  data_bridge: "JSInterface"
