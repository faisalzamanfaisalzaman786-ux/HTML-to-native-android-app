name: System Pro APK Build

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.client_payload.source_files.html_gz_base64 != ''

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 📦 Extract HTML and Icon from GZip Payload
        run: |
          mkdir -p www
          echo '${{ github.event.client_payload.source_files.html_gz_base64 }}' | base64 -d | gunzip > www/index.html
          
          ICON_EXISTS='${{ github.event.client_payload.assets.app_icon_base64 }}'
          if [ -n "$ICON_EXISTS" ]; then
            echo "$ICON_EXISTS" | base64 -d > icon.png
            cp icon.png www/icon.png
          fi
          
          echo "PACKAGE_NAME=${{ github.event.client_payload.build_config.package_name }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.build_config.app_display_name }}" >> $GITHUB_ENV

      - name: 📦 Install Capacitor and Plugins
        run: |
          npm init -y
          npm install @capacitor/cli @capacitor/android
          npm install @capacitor/preferences

      - name: 🗑️ Clean Android Project
        run: rm -rf android

      - name: 🏗️ Initialize Capacitor Android
        run: |
          npx cap init "${{ env.APP_NAME }}" "${{ env.PACKAGE_NAME }}" --web-dir www
          npx cap add android

      - name: 🖼️ Inject App Icon
        run: |
          if [ -f "icon.png" ]; then
            RES_PATH="android/app/src/main/res"
            DENSITIES=("mipmap-mdpi" "mipmap-hdpi" "mipmap-xhdpi" "mipmap-xxhdpi" "mipmap-xxxhdpi")
            for dir in "${DENSITIES[@]}"; do
              mkdir -p "$RES_PATH/$dir"
              cp icon.png "$RES_PATH/$dir/ic_launcher.png"
              cp icon.png "$RES_PATH/$dir/ic_launcher_round.png"
              cp icon.png "$RES_PATH/$dir/ic_launcher_foreground.png"
            done
          fi

      - name: 🔧 Fix Kotlin and Dependency Conflicts
        run: |
          cd android
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.22"/' build.gradle
          cat >> build.gradle << 'GRADLE_EOF'
          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
                      exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
                      exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
                  }
              }
          }
          GRADLE_EOF

      - name: 🔧 Configure SDK and Namespace
        run: |
          cd android
          sed -i '/android {/a\    compileSdk 34' app/build.gradle
          sed -i '/defaultConfig {/a\        minSdk 21\n        targetSdk 34' app/build.gradle
          sed -i "s/namespace .*/namespace \"${{ env.PACKAGE_NAME }}\"/" app/build.gradle

      - name: 🔧 Global Java 21 Fix
        run: |
          cd android
          cat >> build.gradle << 'EOF'
          allprojects {
              tasks.withType(JavaCompile) {
                  sourceCompatibility = JavaVersion.VERSION_21
                  targetCompatibility = JavaVersion.VERSION_21
              }
          }
          EOF

      - name: 🔐 Set Android Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/uses-permission/d' $MANIFEST
          PERMS=(INTERNET CAMERA FLASHLIGHT ACCESS_FINE_LOCATION ACCESS_COARSE_LOCATION READ_EXTERNAL_STORAGE WRITE_EXTERNAL_STORAGE RECORD_AUDIO)
          for perm in "${PERMS[@]}"; do
            sed -i "/<manifest/a\    <uses-permission android:name=\"android.permission.$perm\" />" $MANIFEST
          done

      - name: 🧩 Create Native Prayer Widget
        run: |
          # Work from the android directory
          cd android

          # Create layout for widget
          mkdir -p app/src/main/res/layout
          cat > app/src/main/res/layout/widget_layout.xml << 'WIDGET_LAYOUT_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:padding="16dp"
              android:background="@android:color/white">
              
              <TextClock
                  android:id="@+id/widget_clock"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:textSize="28sp"
                  android:textStyle="bold"
                  android:format12Hour="hh:mm:ss a"
                  android:format24Hour="HH:mm:ss" />
              
              <TextView
                  android:id="@+id/widget_prayer_fajr"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Fajr: --:--"
                  android:layout_marginTop="8dp" />
              <TextView
                  android:id="@+id/widget_prayer_dhuhr"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Dhuhr: --:--" />
              <TextView
                  android:id="@+id/widget_prayer_asr"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Asr: --:--" />
              <TextView
                  android:id="@+id/widget_prayer_maghrib"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Maghrib: --:--" />
              <TextView
                  android:id="@+id/widget_prayer_isha"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="Isha: --:--" />
              
          </LinearLayout>
          WIDGET_LAYOUT_EOF
          
          # Create widget info XML
          mkdir -p app/src/main/res/xml
          cat > app/src/main/res/xml/widget_info.xml << 'WIDGET_INFO_EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <appwidget-provider xmlns:android="http://schemas.android.com/apk/res/android"
              android:minWidth="250dp"
              android:minHeight="200dp"
              android:updatePeriodMillis="0"
              android:initialLayout="@layout/widget_layout"
              android:resizeMode="horizontal|vertical"
              android:widgetCategory="home_screen" />
          WIDGET_INFO_EOF
          
          # Convert package name to path (e.g., com.example.app -> com/example/app)
          PACKAGE_PATH=$(echo "${{ env.PACKAGE_NAME }}" | tr '.' '/')
          WIDGET_PACKAGE_DIR="app/src/main/java/${PACKAGE_PATH}/widget"
          mkdir -p "$WIDGET_PACKAGE_DIR"
          
          # Write the Kotlin Widget Provider class
          cat > "$WIDGET_PACKAGE_DIR/PrayerWidgetProvider.kt" << 'WIDGET_CODE_EOF'
          package ${{ env.PACKAGE_NAME }}.widget
          
          import android.app.PendingIntent
          import android.appwidget.AppWidgetManager
          import android.appwidget.AppWidgetProvider
          import android.content.Context
          import android.content.Intent
          import android.content.SharedPreferences
          import android.widget.RemoteViews
          import com.google.gson.Gson
          import com.google.gson.reflect.TypeToken
          import ${{ env.PACKAGE_NAME }}.MainActivity
          
          class PrayerWidgetProvider : AppWidgetProvider() {
              override fun onUpdate(context: Context, appWidgetManager: AppWidgetManager, appWidgetIds: IntArray) {
                  for (appWidgetId in appWidgetIds) {
                      updateAppWidget(context, appWidgetManager, appWidgetId)
                  }
              }
              
              companion object {
                  fun updateAppWidget(context: Context, appWidgetManager: AppWidgetManager, appWidgetId: Int) {
                      val prefs: SharedPreferences = context.getSharedPreferences("capacitor_preferences", Context.MODE_PRIVATE)
                      val prayerTimesJson = prefs.getString("prayerTimes", "{}")
                      
                      val gson = Gson()
                      val type = object : TypeToken<Map<String, String>>() {}.type
                      val prayerTimes: Map<String, String> = gson.fromJson(prayerTimesJson, type)
                      
                      val views = RemoteViews(context.packageName, context.resources.getIdentifier("widget_layout", "layout", context.packageName))
                      
                      views.setTextViewText(context.resources.getIdentifier("widget_prayer_fajr", "id", context.packageName), 
                          "Fajr: ${prayerTimes["fajr"] ?: "--:--"}")
                      views.setTextViewText(context.resources.getIdentifier("widget_prayer_dhuhr", "id", context.packageName), 
                          "Dhuhr: ${prayerTimes["dhuhr"] ?: "--:--"}")
                      views.setTextViewText(context.resources.getIdentifier("widget_prayer_asr", "id", context.packageName), 
                          "Asr: ${prayerTimes["asr"] ?: "--:--"}")
                      views.setTextViewText(context.resources.getIdentifier("widget_prayer_maghrib", "id", context.packageName), 
                          "Maghrib: ${prayerTimes["maghrib"] ?: "--:--"}")
                      views.setTextViewText(context.resources.getIdentifier("widget_prayer_isha", "id", context.packageName), 
                          "Isha: ${prayerTimes["isha"] ?: "--:--"}")
                      
                      // Open main app when widget is tapped
                      val intent = Intent(context, MainActivity::class.java)
                      val pendingIntent = PendingIntent.getActivity(context, 0, intent, PendingIntent.FLAG_IMMUTABLE)
                      views.setOnClickPendingIntent(android.R.id.background, pendingIntent)
                      
                      appWidgetManager.updateAppWidget(appWidgetId, views)
                  }
              }
          }
          WIDGET_CODE_EOF
          
          # Add the widget receiver to AndroidManifest.xml
          MANIFEST_FILE="app/src/main/AndroidManifest.xml"
          # Insert before </application>
          sed -i "/<\/application>/i \        <receiver android:name=\"${PACKAGE_PATH}.widget.PrayerWidgetProvider\">\n            <intent-filter>\n                <action android:name=\"android.appwidget.action.APPWIDGET_UPDATE\" />\n            </intent-filter>\n            <meta-data android:name=\"android.appwidget.provider\" android:resource=\"@xml/widget_info\" />\n        </receiver>" "$MANIFEST_FILE"
          
          # Add Gson dependency to app/build.gradle
          echo "dependencies { implementation 'com.google.code.gson:gson:2.10.1' }" >> app/build.gradle

      - name: 🔄 Sync and Build Debug APK with Widget
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
