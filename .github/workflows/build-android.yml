name: System Pro V3.6 - Widget Stability Fix

on:
  repository_dispatch:
    types: [system_pro_build]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 📦 Extract Data
        run: |
          mkdir -p www
          echo '${{ github.event.client_payload.source_files.html_gz_base64 }}' | base64 -d | gunzip > www/index.html
          echo "APP_NAME=${{ github.event.client_payload.build_config.app_display_name }}" >> $GITHUB_ENV
          echo "PKG=${{ github.event.client_payload.build_config.package_name }}" >> $GITHUB_ENV

      - name: 🏗️ Initialize Capacitor
        run: |
          npm install @capacitor/cli @capacitor/android
          npx cap init "${{ env.APP_NAME }}" "${{ env.PKG }}" --web-dir www
          npx cap add android

      - name: 🖼️ Icon Fix
        run: |
          if [ ! -z "${{ github.event.client_payload.assets.app_icon_base64 }}" ]; then
            echo "${{ github.event.client_payload.assets.app_icon_base64 }}" | base64 -d > icon_temp.png
            RES_PATH="android/app/src/main/res"
            rm -rf $RES_PATH/mipmap-anydpi-v26
            find $RES_PATH -name "ic_launcher*.xml" -delete
            find $RES_PATH -name "ic_launcher*.webp" -delete
            for dir in $RES_PATH/mipmap-*; do
              cp icon_temp.png "$dir/ic_launcher.png"
              cp icon_temp.png "$dir/ic_launcher_round.png"
              cp icon_temp.png "$dir/ic_launcher_foreground.png"
            done
            mkdir -p $RES_PATH/drawable
            cp icon_temp.png $RES_PATH/drawable/app_logo.png
          fi

      - name: 🛠️ Safe Widget Injection
        run: |
          PKG_PATH=$(echo "${{ env.PKG }}" | sed 's/\./\//g')
          DIR="android/app/src/main/java/$PKG_PATH"
          RES="android/app/src/main/res"
          mkdir -p "$DIR" "$RES/layout" "$RES/xml"

          # سادہ اور محفوظ لے آؤٹ تاکہ 'Can't load' کا مسئلہ نہ آئے
          cat > "$RES/layout/system_pro_widget.xml" << 'EOF'
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent" android:layout_height="match_parent"
              android:orientation="vertical" android:background="#000000" android:padding="10dp">
              <TextView android:id="@+id/widget_timer" android:layout_width="match_parent" android:layout_height="wrap_content" 
                  android:text="00:00:00" android:textColor="#00f3ff" android:textSize="22sp" android:gravity="center" android:textStyle="bold"/>
              <TextView android:layout_width="match_parent" android:layout_height="wrap_content" 
                  android:text="Fajr 04:26 | Zohr 12:28" android:textColor="#ffffff" android:textSize="12sp" android:gravity="center" android:layout_marginTop="5dp"/>
              <TextView android:layout_width="match_parent" android:layout_height="wrap_content" 
                  android:text="Asr 15:54 | Maghrib 19:07" android:textColor="#ffffff" android:textSize="12sp" android:gravity="center"/>
              <TextView android:layout_width="match_parent" android:layout_height="wrap_content" 
                  android:text="Isha 20:30" android:textColor="#ffffff" android:textSize="12sp" android:gravity="center"/>
          </LinearLayout>
          EOF

          cat > "$RES/xml/widget_info.xml" << 'EOF'
          <appwidget-provider xmlns:android="http://schemas.android.com/apk/res/android"
              android:minWidth="180dp" android:minHeight="110dp"
              android:updatePeriodMillis="0" android:initialLayout="@layout/system_pro_widget"></appwidget-provider>
          EOF

          cat > "$DIR/WidgetUpdateService.java" << EOF
          package ${{ env.PKG }};
          import android.app.*; import android.appwidget.*; import android.content.*; import android.os.*;
          import android.widget.RemoteViews; import java.text.SimpleDateFormat; import java.util.Date; import java.util.Locale;
          public class WidgetUpdateService extends Service {
              private Handler h = new Handler(Looper.getMainLooper());
              private Runnable r = new Runnable() { @Override public void run() { update(); h.postDelayed(this, 1000); } };
              @Override public int onStartCommand(Intent i, int f, int s) { h.post(r); return START_STICKY; }
              private void update() {
                  try {
                      AppWidgetManager m = AppWidgetManager.getInstance(this);
                      RemoteViews v = new RemoteViews(getPackageName(), R.layout.system_pro_widget);
                      v.setTextViewText(R.id.widget_timer, new SimpleDateFormat("HH:mm:ss", Locale.getDefault()).format(new Date()));
                      m.updateAppWidget(new ComponentName(this, AppWidget.class), v);
                  } catch (Exception e) {}
              }
              @Override public IBinder onBind(Intent i) { return null; }
          }
          EOF

          cat > "$DIR/AppWidget.java" << EOF
          package ${{ env.PKG }};
          import android.appwidget.*; import android.content.*;
          public class AppWidget extends AppWidgetProvider {
              @Override public void onUpdate(Context c, AppWidgetManager m, int[] i) {
                  c.startService(new Intent(c, WidgetUpdateService.class));
              }
          }
          EOF

      - name: 🔧 Build Fixes
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/<application/i \    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />' $MANIFEST
          sed -i '/<\/application>/i \
          <service android:name=".WidgetUpdateService" android:enabled="true" android:exported="false" /> \
          <receiver android:name=".AppWidget" android:exported="true"> \
              <intent-filter><action android:name="android.appwidget.action.APPWIDGET_UPDATE" /></intent-filter> \
              <meta-data android:name="android.appwidget.provider" android:resource="@xml/widget_info" /> \
          </receiver>' $MANIFEST
          cd android/app
          echo "configurations.all { exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'; exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8' }" >> build.gradle
          cd ..
          echo "subprojects { configurations.all { resolutionStrategy { force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22' } } }" >> build.gradle

      - name: 🔄 Build
        run: |
          npx cap sync android
          cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: 📤 Upload
        uses: actions/upload-artifact@v4
        with:
          name: SystemPro-V3.6-Success
          path: android/app/build/outputs/apk/debug/app-debug.apk
