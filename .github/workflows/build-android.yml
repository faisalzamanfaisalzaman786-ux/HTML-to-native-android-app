name: Build Android APK using Capacitor

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 🧾 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 📦 Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/cli @capacitor/android

      # 👇 اگر آپ کا پروجیکٹ کسی sub-folder میں ہے تو یہاں working-directory استعمال کریں
      - name: 📁 Prepare Web Assets
        run: |
          mkdir -p www
          # فرض کیا جا رہا ہے کہ index.html اور icon.png ریپو کی root میں موجود ہیں
          cp index.html www/ 2>/dev/null || echo "<h1>Web App</h1>" > www/index.html
          cp icon.png www/ 2>/dev/null || true

      - name: 🏗️ Initialize Capacitor Project
        run: |
          # اپنی مرضی کا App Name اور Package Name یہاں تبدیل کریں
          npx cap init "MyApp" "com.myapp.publisher" --web-dir www
          npx cap add android

      # 🚀 اہم ترین Step: app/build.gradle کو مکمل طور پر درست ورژن سے Overwrite کریں
      - name: 📝 Overwrite app/build.gradle with correct syntax
        run: |
          cat > android/app/build.gradle <<'EOF'
          apply plugin: 'com.android.application'

          android {
              namespace "com.myapp.publisher"
              compileSdk 34

              defaultConfig {
                  applicationId "com.myapp.publisher"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
                  testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
              testImplementation 'junit:junit:4.13.2'
              androidTestImplementation 'androidx.test.ext:junit:1.1.5'
              androidTestImplementation 'androidx.test.espresso:espresso-core:3.5.1'
          }
          EOF

      # 🚨 Kotlin ڈپلیکیٹ کلاسز کا مستقل حل
      - name: 🔧 Fix Kotlin Duplicate Classes
        run: |
          cd android

          # 1. Kotlin ورژن کو ایک جگہ سیٹ کریں
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.22"/' build.gradle

          # 2. کنفلکٹ کو روکنے کے لیے Force resolve کریں
          cat >> build.gradle <<'EOF2'

          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22"
                  }
              }
          }
          EOF2

      # ✅ تمام ضروری پرمیشنز کا اضافہ
      - name: 🔐 Add All Permissions
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # پہلے سے موجود پرمیشنز ہٹائیں تاکہ ڈپلیکیٹ نہ ہوں
          sed -i '/uses-permission/d' $MANIFEST
          # نئی پرمیشنز شامل کریں
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.INTERNET" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.CAMERA" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.FLASHLIGHT" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' $MANIFEST
          sed -i '/<manifest/a\    <uses-permission android:name="android.permission.RECORD_AUDIO" />' $MANIFEST

      - name: 🔄 Sync Capacitor & Build APK
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
