name: Build APK from Dispatch

on:
  repository_dispatch:
    types: [system_pro_build]   # 👈 یہ آپ کے UI کے event_type سے میل کھاتا ہے

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.client_payload.source_files.html_code != ''

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ----- Payload ڈیٹا نکالیں -----
      - name: 📦 Extract HTML and Icon from Payload
        run: |
          mkdir -p www

          # HTML ڈی کوڈ کریں (Base64 -> UTF-8)
          echo '${{ github.event.client_payload.source_files.html_code }}' | base64 -d > www/index.html

          # Icon ڈی کوڈ کریں (اگر موجود ہو)
          if [ -n "${{ github.event.client_payload.assets.app_icon_base64 }}" ]; then
            echo '${{ github.event.client_payload.assets.app_icon_base64 }}' | base64 -d > icon.png
            cp icon.png www/icon.png
          else
            echo "No icon provided, skipping"
          fi

          # Build Config سے پیکیج نام اور ایپ کا نام لیں
          echo "PACKAGE_NAME=${{ github.event.client_payload.build_config.package_name }}" >> $GITHUB_ENV
          echo "APP_NAME=${{ github.event.client_payload.build_config.app_display_name }}" >> $GITHUB_ENV

      - name: 📦 Install Capacitor
        run: |
          npm init -y
          npm install @capacitor/cli @capacitor/android

      - name: 🏗️ Initialize Capacitor Project
        run: |
          npx cap init "${{ env.APP_NAME }}" "${{ env.PACKAGE_NAME }}" --web-dir www
          npx cap add android

      # 🔧 درست build.gradle (پچھلی تمام غلطیوں کا حل)
      - name: 📝 Override app/build.gradle with working config
        run: |
          cat > android/app/build.gradle <<'EOF'
          apply plugin: 'com.android.application'

          android {
              namespace "${{ env.PACKAGE_NAME }}"
              compileSdk 34

              defaultConfig {
                  applicationId "${{ env.PACKAGE_NAME }}"
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
                  testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
          }

          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF

      # 🚨 Kotlin duplicate classes کا مستقل حل
      - name: 🔧 Fix Kotlin version conflicts
        run: |
          cd android
          sed -i 's/ext.kotlin_version = .*/ext.kotlin_version = "1.9.22"/' build.gradle
          cat >> build.gradle <<'EOF2'

          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force "org.jetbrains.kotlin:kotlin-stdlib:1.9.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22"
                      force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.22"
                  }
              }
          }
          EOF2

      # ✅ تمام پرمیشنز (کیمرہ، فلاش، لوکیشن، اسٹوریج، آڈیو، انٹرنیٹ)
      - name: 🔐 Add All Permissions to AndroidManifest.xml
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i '/uses-permission/d' $MANIFEST
          for perm in INTERNET CAMERA FLASHLIGHT ACCESS_FINE_LOCATION ACCESS_COARSE_LOCATION READ_EXTERNAL_STORAGE WRITE_EXTERNAL_STORAGE RECORD_AUDIO; do
            sed -i "/<manifest/a\    <uses-permission android:name=\"android.permission.$perm\" />" $MANIFEST
          done

      - name: 🔄 Sync Capacitor & Build APK
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: 📤 Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
